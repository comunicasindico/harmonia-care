<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:Arial;background:#f4f6f9}
#app{padding:20px}
h1{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.turnos{margin:20px 0;display:flex;gap:10px;flex-wrap:wrap}
.rotina{background:#fff;padding:18px;border-radius:12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.pendente{border-left:6px solid #e74c3c}
.concluida{border-left:6px solid #2ecc71}
.atrasada{border-left:6px solid #f39c12}
.critico{background:#ffdddd!important;border-left:8px solid #c0392b}
.timeline-item{background:#fff;padding:12px;margin-bottom:8px;border-left:4px solid #3498db;border-radius:6px}
.risco-baixo{color:#2ecc71;font-weight:bold}
.risco-medio{color:#f39c12;font-weight:bold}
.risco-alto{color:#e74c3c;font-weight:bold}
button{padding:8px 14px;border:0;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-executar{background:#3498db;color:#fff}
.btn-disabled{background:#bdc3c7}
.btn-pdf{background:#8e44ad;color:#fff}
canvas{width:100%!important;max-width:600px;margin:20px auto;display:block}
#ceoBox{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.banner-alerta{position:fixed;top:0;left:0;width:100%;background:#c0392b;color:#fff;padding:12px;text-align:center;font-weight:bold;z-index:999;display:none;}

.layout-hospital{
display:grid;
grid-template-columns:300px 1fr;
gap:20px;
align-items:start;
}

.col-esquerda{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
position:sticky;
top:70px;
height:fit-content;
}

.col-centro{
min-height:400px;
}

@media(max-width:1024px){
.layout-hospital{
grid-template-columns:1fr;
}
.col-esquerda{
position:relative;
top:0;
}
}
.dashboard-executivo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin:20px 0;
}

.card-dash{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
text-align:center;
}

.card-dash h4{
margin:0;
font-size:14px;
color:#555;
}

.card-dash span{
display:block;
margin-top:8px;
font-size:24px;
font-weight:bold;
color:#2c3e50;
}
  
</style>
</head>

<body>

<div id="bannerCritico" class="banner-alerta"></div>

<div id="loginBox">
<h2>Login</h2>
<input id="emailInput" placeholder="Email">
<input id="senhaInput" type="password" placeholder="Senha">
<button onclick="login()" class="btn-executar" style="width:100%">Entrar</button>
</div>
<div id="app" style="display:none">

<h1>
<span id="tituloTurno">Rotinas - Manhã</span>
<div style="display:flex;gap:10px;">
<button onclick="logout()" class="btn-disabled">Sair</button>
</div>
</h1>
<!-- DASHBOARD EXECUTIVO -->
<div class="dashboard-executivo">
<div class="card-dash">
<h4>👥 Pacientes</h4>
<span id="dashPacientes">0</span>
</div>

<div class="card-dash">
<h4>🚨 Críticos</h4>
<span id="dashCriticos">0</span>
</div>

<div class="card-dash">
<h4>⏳ Atrasos</h4>
<span id="dashAtrasos">0</span>
</div>

<div class="card-dash">
<h4>✅ Concluídas</h4>
<span id="dashConcluidas">0</span>
</div>

<div class="card-dash">
<h4>📊 Execução %</h4>
<span id="dashPercentual">0%</span>
</div>

<div class="card-dash">
<h4>💊 Medicações Hoje</h4>
<span id="dashMedicacoes">0</span>
</div>
</div>
<div class="layout-hospital">

<!-- COLUNA ESQUERDA -->
<div class="col-esquerda">
<h3>🏥 Ranking Críticos</h3>
<div id="rankingBox"></div>
</div>

<!-- COLUNA CENTRAL -->
<div class="col-centro">

<div class="turnos">
<button onclick="carregarRotinas('manhã')">Manhã</button>
<button onclick="carregarRotinas('tarde')">Tarde</button>
<button onclick="carregarRotinas('noite')">Noite</button>
</div>

<canvas id="graficoTurno"></canvas>
<div id="lista"></div>

</div>

</div>

<hr style="margin:40px 0">

<h2>Histórico Geral</h2>
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistorico()" class="btn-executar">Filtrar</button>
<div id="historicoLista"></div>

<div id="ceoBox" style="display:none"></div>

</div>

<script>

/* =====================================================
   001 – CONFIG
===================================================== */
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let user=null;
let grafico=null;
let graficoPaciente=null;

/* =====================================================
   002 – LOGIN / LOGOUT
===================================================== */
async function login(){
const {data,error}=await db.auth.signInWithPassword({
email:emailInput.value.trim(),
password:senhaInput.value});
if(error){alert(error.message);return;}
user=data.user;
iniciarApp();
}

async function logout(){
await db.auth.signOut();
location.reload();
}

/* =====================================================
   003 – INICIAR APP
===================================================== */
function iniciarApp(){
loginBox.style.display="none";
app.style.display="block";

const hoje=new Date().toISOString().split("T")[0];
histInicio.value=hoje;
histFim.value=hoje;

carregarRotinas("manhã");
carregarHistorico();
carregarRankingCriticos();
carregarDashboard();
}

/* =====================================================
   004 – DASHBOARD EXECUTIVO
===================================================== */
async function carregarDashboard(){

const {data}=await db.rpc("rotina_completa_por_turno",{
p_empresa_id:EMPRESA_ID,
p_turno:"manhã"
});

if(!data)return;

let pacientes=new Set();
let criticos=0;
let atrasos=0;
let concluidas=0;
let total=data.length;

data.forEach(r=>{
pacientes.add(r.paciente_id);
if(r.risco==="critico"||r.risco==="alto")criticos++;
if(r.status==="atrasado")atrasos++;
if(r.status==="concluida")concluidas++;
});

let percentual=total?Math.round((concluidas/total)*100):0;

document.getElementById("dashPacientes").innerText=pacientes.size;
document.getElementById("dashCriticos").innerText=criticos;
document.getElementById("dashAtrasos").innerText=atrasos;
document.getElementById("dashConcluidas").innerText=concluidas;
document.getElementById("dashPercentual").innerText=percentual+"%";
document.getElementById("dashMedicacoes").innerText=total;
}

/* =====================================================
   005 – ROTINAS
===================================================== */
async function carregarRotinas(turno){

tituloTurno.innerText=`Rotinas - ${turno}`;
const {data}=await db.rpc("rotina_completa_por_turno",{p_empresa_id:EMPRESA_ID,p_turno:turno});

lista.innerHTML="";
let c=0,p=0,a=0;

data?.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;

lista.innerHTML+=`
<div class="rotina ${r.status}">
<div>
<strong>${r.horario_execucao||"--:--"}</strong>
${r.titulo}<br>
Paciente: <a href="#" onclick="verPaciente('${r.paciente_id}')">${r.paciente_nome}</a>
</div>
<button class="btn-executar" onclick="executar('${r.id}','${turno}')">Executar</button>
</div>`;
});
}

/* =====================================================
   006 – EXECUTAR (ATUALIZA TUDO)
===================================================== */
async function executar(id,turno){

await db.rpc("executar_rotina",{
p_rotina_id:id,
p_usuario_id:user.id
});

await carregarRotinas(turno);
await carregarRankingCriticos();
await carregarDashboard();
}

/* =====================================================
   007 – RANKING CRÍTICOS (FORMATO EXECUTIVO SIMPLES)
===================================================== */
async function carregarRankingCriticos(){
const {data}=await db
.from("ranking_pacientes_criticos")
.select("*")
.order("score_clinico",{ascending:false})
.limit(10);
let html="";
if(!data || data.length===0){
html="<p>Nenhum paciente crítico.</p>";
}else{

data.forEach((p,i)=>{
html+=`
<div style="margin-bottom:8px;">
<strong>#${i+1} - ${p.nome_completo}</strong>
&nbsp;&nbsp;Score: <strong>${p.score_clinico}</strong>
&nbsp;&nbsp;Atrasos: <strong>${p.total_atrasos}</strong>
</div>`;
});
}
document.getElementById("rankingBox").innerHTML=html;
}
/* =====================================================
   008 – HISTÓRICO GERAL OPERACIONAL POR TURNO
===================================================== */
async function carregarHistorico(){
const dataInicio = histInicio.value;
const dataFim = histFim.value;
let query = db.from("historico_completo").select("*");
if(dataInicio) query = query.gte("data",dataInicio);
if(dataFim) query = query.lte("data",dataFim);
const {data} = await query;
if(!data || data.length===0){
historicoLista.innerHTML="<p>Nenhum registro encontrado.</p>";
return;
}
/* ORGANIZAR POR TURNO */
let turnos = {
"manhã":{},
"tarde":{},
"noite":{}
};
data.forEach(r=>{
if(!turnos[r.turno]) return;
if(!turnos[r.turno][r.paciente_nome]){
turnos[r.turno][r.paciente_nome]=[];
}
let statusLetra =
r.status==="pendente"?"(P)":
r.status==="concluida"?"(C)":"( )";

turnos[r.turno][r.paciente_nome].push(
`${r.titulo} ${statusLetra}`
);
});
/* RENDERIZAR */
let html="";
Object.keys(turnos).forEach(turno=>{
if(Object.keys(turnos[turno]).length===0) return;
html+=`<h3>Turno: ${turno.toUpperCase()}</h3>`;
html+=`<div><strong>DIA ${dataInicio}</strong>: (P) Pendente (C) Concluída ( ) Outra ação</div><br>`;
Object.keys(turnos[turno])
.sort()
.forEach(nome=>{
html+=`
<div style="margin-bottom:6px;">
<strong>${nome}</strong> - 
${turnos[turno][nome].join("; ")}
</div>`;
});
html+="<br>";
});
historicoLista.innerHTML=html;
}
/* =====================================================
   009 – VISÃO INDIVIDUAL PACIENTE
===================================================== */
async function verPaciente(id){

const {data}=await db.from("paciente_prontuario")
.select("*")
.eq("paciente_id",id);

if(!data||data.length===0)return;

const {data:scoreData}=await db.rpc("calcular_score_clinico",{paciente_uuid:id});
let score=scoreData||0;

const {data:classificacao}=await db.rpc("classificar_risco",{score});
let risco=classificacao||"baixo";

let cor=risco==="critico"?"risco-alto":
risco==="alto"?"risco-alto":
risco==="medio"?"risco-medio":"risco-baixo";

ceoBox.style.display="block";
ceoBox.innerHTML=`
<h2>${data[0].nome_completo}</h2>
<p>Score Clínico: ${score}</p>
<p>Risco: <span class="${cor}">${risco.toUpperCase()}</span></p>
<button onclick="gerarPDF('${data[0].nome_completo}',${score})" class="btn-pdf">Gerar PDF</button>
<h3>Histórico</h3>
<div id="linhaTempo"></div>`;

let linha=document.getElementById("linhaTempo");
linha.innerHTML="";

data.forEach(r=>{
linha.innerHTML+=`
<div class="timeline-item">
${r.data_referencia} - ${r.nome_medicamento||"-"} - ${r.status}
</div>`;
});
}

/* =====================================================
   010 – GERAR PDF
===================================================== */
function gerarPDF(nome,score){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.text(`Prontuário - ${nome}`,20,20);
doc.text(`Score Clínico: ${score}`,20,30);
doc.save(`${nome}.pdf`);
}


</script>
</body>
</html>
