<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<style>
body{font-family:Arial;margin:0;padding:20px;background:#f4f6f9}
h1{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.rotina{background:#fff;padding:15px;border-radius:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.pendente{border-left:6px solid #e74c3c}.concluida{border-left:6px solid #2ecc71}.atrasada{border-left:6px solid #f39c12}
button{padding:8px 14px;border:0;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-executar{background:#3498db;color:#fff}
.btn-disabled{background:#bdc3c7}
.btn-logout{background:#e74c3c;color:#fff}
.btn-historico{background:#2c3e50;color:#fff}
#loginBox{max-width:300px;margin:80px auto;text-align:center}
input{width:100%;margin-bottom:10px;padding:8px}
#historicoBox{display:none;margin-top:30px}
.historico-item{background:#fff;padding:10px;margin-bottom:8px;border-radius:6px;font-size:14px}
canvas{max-width:320px;margin-top:20px}
</style>
</head>

<body>

<!-- ITEM 1 – LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()" class="btn-executar" style="width:100%">Entrar</button>
</div>

<!-- ITEM 2 – APP -->
<div id="app" style="display:none">
<h1>
<span>Rotinas - Turno Manhã</span>
<div>
<button onclick="toggleHistorico()" class="btn-historico">Histórico</button>
<button onclick="logout()" class="btn-logout">Sair</button>
</div>
</h1>

<div id="painel" style="margin-bottom:20px;font-weight:bold"></div>
<canvas id="graficoTurno"></canvas>
<div id="lista"></div>

<div id="historicoBox">
<h2>Histórico</h2>
<div id="historicoLista"></div>
</div>
</div>

<script>

/* ITEM 3 – CONFIG */
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="sb_publishable_u77uCBMOBZs8rKsTaMfh6w_mI9viKdh";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";
const TURNO_ID="b0efcb02-29a3-41e3-bcb3-0f17ab00a000";

let user=null,nivel=null,grafico=null,appReady=false;

/* ITEM 4 – LOGIN */
async function login(){
const email=email.value,senha=senha.value;
const {data,error}=await db.auth.signInWithPassword({email,password:senha});
if(error){alert("Login inválido");return;}
user=data.user;await carregarNivel();iniciarApp();
}

/* ITEM 5 – NÍVEL */
async function carregarNivel(){
if(!user)return;
const {data}=await db.from('perfis').select('nivel').eq('usuario_id',user.id).maybeSingle();
nivel=data?.nivel||null;
}

/* ITEM 6 – AUTO SESSION */
db.auth.getSession().then(async({data})=>{
if(data.session){user=data.session.user;await carregarNivel();iniciarApp();}
});

function iniciarApp(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
appReady=true;
carregarRotinas();
}

/* ITEM 7 – GRÁFICO */
function atualizarGrafico(c,p,a){
const ctx=document.getElementById("graficoTurno").getContext("2d");
if(grafico)grafico.destroy();
grafico=new Chart(ctx,{
type:"doughnut",
data:{labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{data:[c,p,a],backgroundColor:["#2ecc71","#e74c3c","#f39c12"]}]}
});
}

/* ITEM 8 – ROTINAS */
async function carregarRotinas(){
if(!appReady)return;

const {data}=await db.rpc('rotina_diaria_por_turno',{p_empresa_id:EMPRESA_ID,p_turno_id:TURNO_ID});
if(!data)return;

const lista=document.getElementById("lista");lista.innerHTML="";
let total=data.length,
c=data.filter(r=>r.status_execucao==="concluida").length,
p=data.filter(r=>r.status_execucao==="pendente").length,
a=data.filter(r=>r.status_execucao==="pendente"&&new Date().toLocaleTimeString()>r.horario_previsto).length;

painel.innerHTML=`Total:${total} | Concluídas:${c} | Pendentes:${p} | Atrasadas:${a} | ${total?Math.round(c/total*100):0}%`;
atualizarGrafico(c,p,a);

data.forEach(r=>{
let div=document.createElement("div");
div.className=`rotina ${r.status_execucao==="concluida"?"concluida":(new Date().toLocaleTimeString()>r.horario_previsto?"atrasada":"pendente")}`;
let pode=(nivel==="admin"||nivel==="supervisor");
div.innerHTML=`<div><strong>${r.horario_previsto}</strong> - ${r.titulo}
${r.horario_executado?`<br><small>Executado às ${new Date(r.horario_executado+'Z').toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo'})}</small>`:''}
</div>
${r.status_execucao==="concluida"
?`<button class="btn-disabled">Concluída</button>`
:(pode?`<button class="btn-executar" onclick="executar('${r.id}')">Executar</button>`:`<button class="btn-disabled">Sem permissão</button>`)}
`;
lista.appendChild(div);
});
}

/* ITEM 9 – EXECUTAR */
async function executar(id){
if(!(nivel==="admin"||nivel==="supervisor"))return alert("Acesso restrito");
await db.rpc('executar_rotina',{p_rotina_id:id,p_usuario_id:user.id});
carregarRotinas();
}

/* ITEM 10 – HISTÓRICO */
function toggleHistorico(){
if(nivel!=="admin")return alert("Acesso restrito ao administrador");
historicoBox.style.display=historicoBox.style.display==="none"?"block":"none";
if(historicoBox.style.display==="block")carregarHistorico();
}

async function carregarHistorico(){
const {data}=await db.from('rotinas_execucao')
.select(`rotina_id,horario_executado,perfis!fk_usuario(nome)`)
.order('horario_executado',{ascending:false}).limit(50);

historicoLista.innerHTML="";
data.forEach(r=>{
historicoLista.innerHTML+=`
<div class="historico-item">
Rotina: ${r.rotina_id} |
Usuário: ${r.perfis?.nome||"Não identificado"} |
${new Date(r.horario_executado+'Z').toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo'})}
</div>`;
});
}

/* ITEM 11 – LOGOUT */
async function logout(){
await db.auth.signOut();
location.reload();
}

</script>
</body>
</html>
