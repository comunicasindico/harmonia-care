<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

#app{padding:30px}

h1{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 16px;
border:0;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-executar{background:#3498db;color:#fff}
.btn-secundario{background:#555;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}

/* STATUS CORES */
.status-concluida{
background:#e8f8f0;
border-left:5px solid #2ecc71;
}
.status-pendente{
background:#fdecea;
border-left:5px solid #e74c3c;
}
.status-atrasado{
background:#fff4e5;
border-left:5px solid #f39c12;
}

/* LAYOUT */
.layout-hospital{
display:grid;
grid-template-columns:1fr 1.2fr;
gap:40px;
margin-bottom:40px;
}

.col-esquerda{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.timeline-item{
padding:12px;
margin-bottom:8px;
border-radius:6px;
}

.ranking-table{
width:100%;
border-collapse:collapse;
}

.ranking-table th,
.ranking-table td{
padding:8px;
border-bottom:1px solid #eee;
}

.search-box{
margin-bottom:15px;
}

.search-box input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* GRÁFICO */
.grafico-container{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
}

.grafico-wrapper{
width:600px;
max-width:95%;
height:350px;
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

#graficoInstitucional{
width:100% !important;
height:100% !important;
}

@media(max-width:1000px){
.layout-hospital{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div id="app">

<h1>
<span>Harmonia Care</span>
<button class="btn-danger">Sair</button>
</h1>

<div class="layout-hospital">

<div class="col-esquerda">

<h3>Selecionar Paciente</h3>
<select id="selectPaciente" onchange="carregarHistoricoRotinas()"></select>

<h3 style="margin-top:25px;">Selecionar Colaborador</h3>
<select id="selectColaborador" onchange="carregarHistoricoRotinas()"></select>

</div>

<div>
<h3>Ranking Crítico</h3>
<div id="rankingBox"></div>
</div>

</div>

<hr>

<h2>Históricos</h2>

<div style="display:flex;gap:10px;margin-bottom:15px;">
<button onclick="carregarHistoricoRotinas()" class="btn-secundario">Rotinas</button>
<button onclick="carregarHistoricoClinico()" class="btn-executar">Clínico</button>
<button onclick="exportarPDF()" class="btn-danger">Exportar PDF</button>
</div>

<div style="display:flex;gap:10px;margin-bottom:15px;">
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistoricoRotinas()" class="btn-executar">Filtrar</button>
</div>

<div class="search-box">
<input type="text" id="buscaDinamica" placeholder="Buscar paciente ou rotina..." onkeyup="filtrarBusca()">
</div>

<div id="historicoLista"></div>

<!-- GRÁFICO FINAL CENTRALIZADO -->
<div class="grafico-container">
<h3>Indicador Institucional</h3>
<div class="grafico-wrapper">
<canvas id="graficoInstitucional"></canvas>
</div>
</div>

</div>

<script>
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let dadosAtuais=[];
let graficoInstitucional=null;

/* PACIENTES */
async function carregarPacientes(){
const {data}=await db.from("pacientes")
.select("id,nome_completo")
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo");

let html=`<option value="todos">Todos os pacientes</option>`;
data?.forEach(p=>html+=`<option value="${p.id}">${p.nome_completo}</option>`);
selectPaciente.innerHTML=html;
}

/* COLABORADORES */
async function carregarColaboradores(){
const {data}=await db.from("vw_usuarios")
.select("id,nome_completo")
.order("nome_completo");

let html=`<option value="todos">Todos os colaboradores</option>`;
data?.forEach(c=>html+=`<option value="${c.id}">${c.nome_completo}</option>`);
selectColaborador.innerHTML=html;
}

/* HISTÓRICO ROTINAS */
async function carregarHistoricoRotinas(){

let inicio = histInicio.value;
let fim = histFim.value;
let paciente = selectPaciente.value;

let query = db.from("rotina_execucao")
.select(`
data,
status,
paciente_id,
pacientes (nome_completo),
rotina_modelos (titulo)
`)
.gte("data", inicio)
.lte("data", fim);

if(paciente !== "todos"){
query=query.eq("paciente_id",paciente);
}

const {data}=await query.order("data",{ascending:false});

dadosAtuais=data||[];

renderizarLista(dadosAtuais);
}

/* RENDER */
function renderizarLista(lista){

if(!lista || lista.length===0){
historicoLista.innerHTML="<p>Nenhuma rotina encontrada.</p>";
return;
}

let html="";

lista.forEach(r=>{
let classe="";
if(r.status==="concluida") classe="status-concluida";
else if(r.status==="pendente") classe="status-pendente";
else classe="status-atrasado";

html+=`
<div class="timeline-item ${classe}">
<strong>${r.data}</strong> -
${r.pacientes?.nome_completo} -
${r.rotina_modelos?.titulo}
(${r.status})
</div>`;
});

historicoLista.innerHTML=html;
}

/* BUSCA */
function filtrarBusca(){
let termo = buscaDinamica.value.toLowerCase();

let filtrado = dadosAtuais.filter(r =>
r.pacientes?.nome_completo.toLowerCase().includes(termo) ||
r.rotina_modelos?.titulo.toLowerCase().includes(termo)
);

renderizarLista(filtrado);
}

/* PDF */
async function exportarPDF(){
if(!dadosAtuais.length){alert("Sem dados.");return;}
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text("Relatório Harmonia Care",20,20);
let y=30;
dadosAtuais.forEach(r=>{
doc.text(`${r.data} - ${r.pacientes?.nome_completo} - ${r.rotina_modelos?.titulo} (${r.status})`,20,y);
y+=8;
if(y>270){doc.addPage();y=20;}
});
doc.save("relatorio_harmonia.pdf");
}

/* GRÁFICO CORRIGIDO */
async function carregarGrafico(){

if(graficoInstitucional){
graficoInstitucional.destroy();
graficoInstitucional=null;
}

const {data}=await db.from("rotina_execucao").select("status");

let c=0,p=0,a=0;
data?.forEach(r=>{
if(r.status==="concluida") c++;
else if(r.status==="pendente") p++;
else a++;
});

graficoInstitucional=new Chart(
document.getElementById("graficoInstitucional"),
{
type:"bar",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{
data:[c,p,a],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"],
borderRadius:6
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:false,
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
});
}

/* INIT */
carregarPacientes();
carregarColaboradores();
carregarGrafico();
</script>

</body>
</html>
