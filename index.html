<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#f4f6f9;}
h1{margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.rotina{background:#fff;padding:15px;border-radius:10px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.pendente{border-left:6px solid #e74c3c;}
.concluida{border-left:6px solid #2ecc71;}
.atrasada{border-left:6px solid #f39c12;}
button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;}
.btn-executar{background:#3498db;color:#fff;}
.btn-disabled{background:#bdc3c7;cursor:not-allowed;}
.btn-logout{background:#e74c3c;color:#fff;}
.btn-historico{background:#2c3e50;color:#fff;}
#loginBox{max-width:300px;margin:80px auto;text-align:center;}
input{width:100%;margin-bottom:10px;padding:8px;}
#historicoBox{display:none;margin-top:30px;}
.historico-item{background:#fff;padding:10px;margin-bottom:8px;border-radius:6px;font-size:14px;}
canvas{max-width:320px;margin-top:20px;}
</style>
</head>

<body>

<div id="loginBox">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()" class="btn-executar" style="width:100%;">Entrar</button>
</div>

<div id="app" style="display:none;">

<h1>
<span>Rotinas - Turno Manhã</span>
<div>
<button onclick="toggleHistorico()" class="btn-historico">Histórico</button>
<button onclick="logout()" class="btn-logout">Sair</button>
</div>
</h1>

<div id="painel" style="display:flex;gap:20px;margin-bottom:20px;font-weight:bold;"></div>
<canvas id="graficoTurno"></canvas>
<div id="lista"></div>

<div id="historicoBox">
<h2>Histórico de Execuções</h2>
<div id="historicoLista"></div>
</div>

</div>

<script>
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="sb_publishable_u77uCBMOBZs8rKsTaMfh6w_mI9viKdh";
const supabaseClient = supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";
const TURNO_MANHA_ID="b0efcb02-29a3-41e3-bcb3-0f17ab00a000";

let usuarioAtual=null;
let nivelAtual=null;
let grafico=null;

/* ================= LOGIN ================= */

async function login(){
const email=document.getElementById("email").value;
const senha=document.getElementById("senha").value;

const {data,error}=await supabaseClient.auth.signInWithPassword({email,password:senha});
if(error){alert("Login inválido");return;}

usuarioAtual=data.user;
await carregarNivel();

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

carregarRotinas();
}

async function logout(){
await supabaseClient.auth.signOut();
usuarioAtual=null;
nivelAtual=null;
document.getElementById("app").style.display="none";
document.getElementById("loginBox").style.display="block";
}

/* ================= PERFIL ================= */

async function carregarNivel(){
if(!usuarioAtual){nivelAtual=null;return;}

const {data,error}=await supabaseClient
.from('perfis')
.select('nivel')
.eq('usuario_id',usuarioAtual.id)
.maybeSingle();

if(error){console.error(error);nivelAtual=null;return;}

nivelAtual=data?.nivel||null;
console.log("Nível carregado:",nivelAtual);
}

/* ================= AUTO SESSION ================= */

supabaseClient.auth.getSession().then(async ({data})=>{
if(data.session){
usuarioAtual=data.session.user;
await carregarNivel();
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
carregarRotinas();
}
});

/* ================= GRÁFICO ================= */

function atualizarGrafico(concluidas,pendentes,atrasadas){
const ctx=document.getElementById("graficoTurno").getContext("2d");

if(grafico){grafico.destroy();}

grafico=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{
data:[concluidas,pendentes,atrasadas],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"]
}]
},
options:{responsive:true}
});
}

/* ================= ROTINAS ================= */

async function carregarRotinas(){
const {data,error}=await supabaseClient.rpc(
'rotina_diaria_por_turno',
{p_empresa_id:EMPRESA_ID,p_turno_id:TURNO_MANHA_ID}
);

if(error){console.error(error);return;}

const lista=document.getElementById("lista");
lista.innerHTML="";

let total=data.length;
let concluidas=data.filter(r=>r.status_execucao==="concluida").length;
let pendentes=data.filter(r=>r.status_execucao==="pendente").length;
let atrasadas=data.filter(r=>r.status_execucao==="pendente"&&new Date().toLocaleTimeString()>r.horario_previsto).length;

document.getElementById("painel").innerHTML=
`Total:${total} | Concluídas:${concluidas} | Pendentes:${pendentes} | Atrasadas:${atrasadas} | ${total?Math.round((concluidas/total)*100):0}%`;

atualizarGrafico(concluidas,pendentes,atrasadas);

data.forEach(rotina=>{
const div=document.createElement("div");

div.className=`rotina ${
rotina.status_execucao==="concluida"
?"concluida"
:(new Date().toLocaleTimeString()>rotina.horario_previsto?"atrasada":"pendente")
}`;

const podeExecutar=(nivelAtual==="admin"||nivelAtual==="supervisor");

div.innerHTML=`
<div>
<strong>${rotina.horario_previsto}</strong> - ${rotina.titulo}
${rotina.horario_executado?
`<br><small style="color:#555;">
Executado às ${new Date(rotina.horario_executado+'Z')
.toLocaleTimeString('pt-BR',{timeZone:'America/Sao_Paulo'})}
</small>`:''}
</div>
${
rotina.status_execucao==="concluida"
?`<button class="btn-disabled">Concluída</button>`
:(podeExecutar
?`<button class="btn-executar" onclick="executar('${rotina.id}')">Executar</button>`
:`<button class="btn-disabled">Sem permissão</button>`)
}
`;

lista.appendChild(div);
});
}

/* ================= EXECUTAR ================= */

async function executar(rotinaId){
if(!(nivelAtual==="admin"||nivelAtual==="supervisor")){
alert("Acesso restrito");
return;
}

const {error}=await supabaseClient.rpc(
'executar_rotina',
{p_rotina_id:rotinaId,p_usuario_id:usuarioAtual.id}
);

if(error){console.error(error);alert("Erro ao executar");return;}

carregarRotinas();
}

/* ================= HISTÓRICO ================= */

function toggleHistorico(){
if(nivelAtual!=="admin"){
alert("Acesso restrito ao administrador");
return;
}
const box=document.getElementById("historicoBox");
box.style.display=box.style.display==="none"?"block":"none";
if(box.style.display==="block")carregarHistorico();
}

async function carregarHistorico(){
const {data,error}=await supabaseClient
.from('rotinas_execucao')
.select(`
  rotina_id,
  horario_executado,
  perfis!fk_usuario (
    nome
  )
`)
.order('horario_executado',{ascending:false})
.limit(50);

if(error){console.error(error);return;}

const box=document.getElementById("historicoLista");
box.innerHTML="";

data.forEach(r=>{
box.innerHTML+=`
<div class="historico-item">
Rotina: ${r.rotina_id} |
Usuário: ${r.perfis?.nome || "Não identificado"} |
${new Date(r.horario_executado+'Z')
.toLocaleString('pt-BR',{timeZone:'America/Sao_Paulo'})}
</div>`;
});
}

/* ================= SERVICE WORKER ================= */

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
