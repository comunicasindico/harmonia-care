<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

#app{padding:30px}

h1{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 16px;
border:0;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-executar{background:#3498db;color:#fff}
.btn-secundario{background:#555;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}

.status-concluida{
background:#e8f8f0;
border-left:5px solid #2ecc71;
}

.status-pendente{
background:#fdecea;
border-left:5px solid #e74c3c;
}

.status-atrasado{
background:#fff4e5;
border-left:5px solid #f39c12;
}

.layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
margin-bottom:40px;
}

.box{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.timeline-item{
padding:12px;
margin-bottom:8px;
border-radius:6px;
}

.search-box input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

.grafico-container{
margin-top:60px;
display:flex;
flex-direction:column;
align-items:center;
}

.grafico-wrapper{
width:600px;
max-width:95%;
height:350px;
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

#graficoInstitucional{
width:100%!important;
height:100%!important;
}
</style>
</head>

<body>

<div id="app">

<h1>
<span>Harmonia Care</span>
<button onclick="logout()" class="btn-danger">Sair</button>
</h1>

<div class="layout">

<div class="box">
<h3>Selecionar Paciente</h3>
<select id="selectPaciente" onchange="carregarHistoricoRotinas()"></select>
</div>

<div class="box">
<h3>Selecionar Colaborador</h3>
<select id="selectColaborador"></select>
</div>

</div>

<hr>

<h2>Históricos</h2>

<div style="display:flex;gap:10px;margin-bottom:15px;">
<button onclick="carregarHistoricoRotinas()" class="btn-secundario">Rotinas</button>
<button onclick="carregarHistoricoClinico()" class="btn-executar">Clínico</button>
<button onclick="exportarPDF()" class="btn-danger">Exportar PDF</button>
</div>

<div style="display:flex;gap:10px;margin-bottom:15px;">
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistoricoRotinas()" class="btn-executar">Filtrar</button>
</div>

<div class="search-box">
<input type="text" id="buscaDinamica" placeholder="Buscar paciente ou rotina..." onkeyup="filtrarBusca()">
</div>

<div id="historicoLista"></div>

<div class="grafico-container">
<h3>Indicador Institucional</h3>
<div class="grafico-wrapper">
<canvas id="graficoInstitucional"></canvas>
</div>
</div>

</div>

<script>

const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let user=null;
let graficoInstitucional=null;

const usuarioSelect=document.getElementById("usuarioSelect");
const senhaInput=document.getElementById("senhaInput");
const usuarioInfo=document.getElementById("usuarioInfo");
const app=document.getElementById("app");
const tituloTurno=document.getElementById("tituloTurno");

/* ================= LOGIN ================= */

async function logout(){
await db.auth.signOut();
app.style.display="none";
document.getElementById("loginWrapper").style.display="flex";
}

async function carregarUsuariosLogin(){
const {data}=await db.from("vw_usuarios")
.select("*")
.eq("empresa_id",EMPRESA_ID)
.order("hierarquia");

let html=`<option value="">Selecione...</option>`;
data?.forEach(u=>{
if(!u.ativo)return;
html+=`<option value="${u.id}" data-email="${u.email}" data-cargo="${u.cargo}">
${u.nome_completo}
</option>`;
});
usuarioSelect.innerHTML=html;
}

usuarioSelect.addEventListener("change",function(){
let s=this.options[this.selectedIndex];
usuarioInfo.innerHTML=s.value?`Cargo: ${s.dataset.cargo}`:"";
});

async function login(){
let s=usuarioSelect.options[usuarioSelect.selectedIndex];
if(!s.value)return alert("Selecione usuário.");
if(!senhaInput.value)return alert("Digite senha.");

const {data,error}=await db.auth.signInWithPassword({
email:s.dataset.email,
password:senhaInput.value
});

if(error)return alert("Senha incorreta.");

const {data:perfil}=await db.from("vw_usuarios")
.select("*")
.eq("id",data.user.id)
.single();

if(!perfil)return;

user=perfil;
iniciarApp();
}

/* ================= INIT ================= */

function iniciarApp(){
document.getElementById("loginWrapper").style.display="none";
app.style.display="block";

tituloTurno.innerText=`Rotinas - Manhã | ${user.nome_completo}`;

const hoje=new Date().toISOString().split("T")[0];
histInicio.value=hoje;
histFim.value=hoje;

carregarDashboard();
carregarPacientes();
carregarColaboradores();
carregarRotinas("manhã");
carregarRankingCriticos();
carregarGraficoInstitucional();
carregarHistoricoClinico();
}

/* ================= DASHBOARD ================= */

async function carregarDashboard(){

const { data } = await db.rpc("rotina_completa_por_turno",{
p_empresa_id:EMPRESA_ID,
p_turno:"manhã"
});

if(!data)return;

let pacientes=new Set();
let criticos=0;
let atrasos=0;
let concluidas=0;

data.forEach(r=>{
pacientes.add(r.paciente_id);
if(r.risco==="critico")criticos++;
if(r.status==="atrasado")atrasos++;
if(r.status==="concluida")concluidas++;
});

dashPacientes.innerText=pacientes.size;
dashCriticos.innerText=criticos;
dashAtrasos.innerText=atrasos;
dashConcluidas.innerText=concluidas;

dashPercentual.innerText=data.length?
Math.round((concluidas/data.length)*100)+"%":"0%";

dashMedicacoes.innerText=data.length;
}

/* ================= ROTINAS ================= */

async function carregarRotinas(turno){

const {data}=await db.rpc("rotina_completa_por_turno",{
p_empresa_id:EMPRESA_ID,
p_turno:turno
});

lista.innerHTML="";

data?.forEach(r=>{
lista.innerHTML+=`
<div class="rotina ${r.status}">
<div>
<strong>${r.horario_execucao||"--:--"}</strong>
${r.titulo}
<br>Paciente: ${r.paciente_nome}
</div>
<button class="btn-executar"
onclick="executar('${r.id}','${turno}')">
Executar
</button>
</div>`;
});
}

async function executar(id,turno){
await db.rpc("executar_rotina",{
p_rotina_id:id,
p_usuario_id:user.id
});
carregarRotinas(turno);
carregarDashboard();
carregarRankingCriticos();
}

/* ================= HISTÓRICO CLÍNICO ================= */

async function carregarHistoricoClinico(){

const {data}=await db.from("vw_historico_geral")
.select("*")
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo");

let html=`<table class="ranking-table">
<thead>
<tr>
<th>Nome</th>
<th>Idade</th>
<th>HAS</th>
<th>DM</th>
<th>D.A</th>
<th>Cardio</th>
<th>Acamado</th>
<th>Dieta</th>
<th>Pressão</th>
<th>Outros</th>
</tr>
</thead><tbody>`;

data?.forEach(p=>{
html+=`
<tr>
<td>${p.nome_completo}</td>
<td>${p.idade||""}</td>
<td>${p.has?"✔":""}</td>
<td>${p.dm?"✔":""}</td>
<td>${p.da?"✔":""}</td>
<td>${p.cardiopatia?"✔":""}</td>
<td>${p.acamado?"✔":""}</td>
<td>${p.dieta||""}</td>
<td>${p.pressao_arterial||""}</td>
<td>${p.outros||""}</td>
</tr>`;
});

html+="</tbody></table>";

historicoLista.innerHTML=html;
}

/* ================= HISTÓRICO ROTINAS ================= */

async function carregarHistorico(){

let inicio=histInicio.value;
let fim=histFim.value;

let query=db.from("historico_rotinas")
.select("*")
.eq("empresa_id",EMPRESA_ID)
.order("data",{ascending:false});

if(inicio)query=query.gte("data",inicio);
if(fim)query=query.lte("data",fim);

const {data}=await query;

let html="";

data?.forEach(h=>{
html+=`
<div class="timeline-item">
<strong>${h.data}</strong> -
${h.paciente_nome} -
${h.titulo}
<span class="status-${h.status}">
(${h.status})
</span>
</div>`;
});

historicoLista.innerHTML=html;
}

/* ================= RANKING ================= */

async function carregarRankingCriticos(){

const {data}=await db.from("ranking_pacientes_criticos")
.select("*")
.eq("empresa_id",EMPRESA_ID)
.order("score_clinico",{ascending:false})
.limit(10);

let html=`<table class="ranking-table">
<thead>
<tr><th>#</th><th>Nome</th><th>Score</th><th>Atrasos</th></tr>
</thead><tbody>`;

data?.forEach((p,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${p.nome_completo}</td>
<td>${p.score_clinico}</td>
<td>${p.total_atrasos}</td>
</tr>`;
});

html+="</tbody></table>";

rankingBox.innerHTML=html;
}

/* ================= GRÁFICO CORRIGIDO ================= */

async function carregarGraficoInstitucional(){

const {data}=await db.rpc("rotina_completa_por_turno",{
p_empresa_id:EMPRESA_ID,
p_turno:"manhã"
});

if(!data)return;

let c=0,p=0,a=0;

data.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;
});

if(graficoInstitucional){
graficoInstitucional.destroy();
graficoInstitucional=null;
}

const ctx=document.getElementById("graficoInstitucional");

graficoInstitucional=new Chart(ctx,{
type:"bar",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{
data:[c,p,a],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"]
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
animation:false,
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
});
}

carregarUsuariosLogin();

</script>

</body>
</html>
