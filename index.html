<style>

body{margin:0;font-family:Arial;background:#f4f6f9}

h1{display:flex;justify-content:space-between}

button{

.alerta-normal{background:#eafaf1;color:#1e8449}
.alerta-atencao{background:#fff3cd;color:#7d6608}
.alerta-alto{background:#fdecea;color:#922b21}

.tabela-clinica{

margin-top:10px;

.tabela-clinica th{

color:#fff;
padding:8px;

.tabela-clinica td{

border-radius:16px;

}

width:100%;
border-collapse:collapse;

}

.tabela-rotinas th{
background:#f0f0f0;

border:1px solid #ddd;
}

.tabela-rotinas td{
padding:6px;
text-align:center;
border:1px solid #eee;
}

.tabela-rotinas tr:hover{
background:#fafafa;
}

  
</style>
</head>

<body>

<div id="loginWrapper" style="position:fixed;inset:0;background:#f4f6f9;display:flex;justify-content:center;align-items:center">

<div style="width:350px;background:#fff;padding:30px;border-radius:16px;text-align:center">

<h2>🔐 Harmonia Care</h2>

<script>

const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let graficoInstitucional=null;

/* PACIENTES */

async function carregarPacientes(){

const {data}=await db
.from("pacientes")
.select("id,nome_completo")
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo");

html+=`<option value="${p.id}">${p.nome_completo}</option>`;
});

document.getElementById("selectPaciente").innerHTML=html;

/* ABRIR PRONTUARIO PACIENTE */

async function abrirProntuarioPaciente(){

const pacienteId = document.getElementById("selectPaciente").value;

if(pacienteId==="todos"){
return;
}

const {data,error}=await db
.from("pacientes")
.select("*")
.eq("id",pacienteId)
.single();

if(error){
console.log(error);
return;
}

let idade = calcularIdade(data.data_nascimento);

document.getElementById("historicoLista").innerHTML=`

<div class="box">

<h3>${data.nome_completo}</h3>

<p><b>Idade:</b> ${idade}</p>

<p><b>Demência:</b> ${data.da ? "Sim":"Não"}</p>
<p><b>Cardiopatia:</b> ${data.cardiopatia ? "Sim":"Não"}</p>
<p><b>Acamado:</b> ${data.acamado ? "Sim":"Não"}</p>
<p><b>Dieta Especial:</b> ${data.dieta_especial ? "Sim":"Não"}</p>

</div>

`;

}


async function carregarColaboradores(){

const {data,error}=await db
.from("usuarios")
.select("id,nome_completo")
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo",{ascending:true});

if(error){
console.log("Erro colaboradores:",error);
return;
}

if(!data){
document.getElementById("selectColaborador").innerHTML="<option>Sem usuários</option>";
return;
}

let html="";

data.forEach(u=>{
html+=`<option value="${u.id}">${u.nome_completo}</option>`;
});

document.getElementById("selectColaborador").innerHTML=html;

}


/* GERAR ROTINAS DO DIA */

async function gerarRotinasDoDia(){

const hoje = new Date();

const data = hoje.toISOString().slice(0,10);
const ano = hoje.getFullYear();
const mes = hoje.getMonth()+1;
const dia = hoje.getDate();

/* PACIENTES */

const {data:pacientes} = await db
.from("pacientes")
.select("id")
.eq("empresa_id",EMPRESA_ID);

/* MODELOS */

const {data:modelos} = await db
.from("rotina_modelos")
.select("id")
.eq("empresa_id",EMPRESA_ID)
.eq("ativo",true);

let inserts=[];

pacientes.forEach(p=>{
modelos.forEach(m=>{

inserts.push({

empresa_id:EMPRESA_ID,
paciente_id:p.id,

modelo_id:m.id,
rotina_modelo_id:m.id,

data:data,
ano:ano,
mes:mes,
dia:dia,

status:"pendente"

});

});
});

const {error}=await db
.from("rotina_execucao")
.insert(inserts);

if(error){
console.error("Erro inserir rotinas:",error);
alert("Erro ao gerar rotinas.");
}

}

/* HISTORICO ROTINAS */

async function carregarHistoricoRotinas(){

const hoje = new Date().toISOString().split("T")[0];

const {data,error}=await db
.from("rotina_execucao")
.select(`
id,
status,
data,
paciente_id,
pacientes:paciente_id(nome_completo),
rotina_modelos:modelo_id(titulo)
`)
.eq("empresa_id",EMPRESA_ID)
.eq("data",hoje)
.order("paciente_id",{ascending:true});

if(error){
console.error("Erro rotinas:",error);
alert("Erro ao carregar rotinas.");
return;
}

if(!data || data.length===0){
document.getElementById("historicoLista").innerHTML="<p>Nenhuma rotina registrada hoje.</p>";
return;
}

/* AGRUPAR POR PACIENTE */

let pacientes={};

data.forEach(r=>{

let pid=r.paciente_id;

if(!pacientes[pid]){
pacientes[pid]={
nome:r.pacientes?.nome_completo ?? "Paciente",
rotinas:[]
};
}

pacientes[pid].rotinas.push(r);

});

/* CONTADORES */

let total=data.length;
let concluidas=data.filter(r=>r.status==="concluida").length;
let pendentes=total-concluidas;

/* DATA */
let dataHoje = new Date().toLocaleDateString("pt-BR");
let html=`

<h3>Rotinas do dia ${dataHoje}</h3>

<div style="margin-bottom:15px;font-size:14px">

<b>Total de Rotinas:</b> ${total}
&nbsp;&nbsp;
<b>✔ Concluídas:</b> ${concluidas}
&nbsp;&nbsp;
<b>⏳ Pendentes:</b> ${pendentes}

</div>

`;

/* LISTAR */

for(let pid in pacientes){

let p=pacientes[pid];

let totalPaciente=p.rotinas.length;
let concluidasPaciente=p.rotinas.filter(r=>r.status==="concluida").length;

html+=`

<div class="box">

<h3>
${p.nome}
<span style="font-size:12px;color:#888">
(${concluidasPaciente}/${totalPaciente})
</span>
</h3>

`;

p.rotinas.forEach(r=>{

let checked = r.status==="concluida" ? "checked" : "";

html+=`

<div style="
display:flex;
align-items:center;
gap:10px;
padding:6px 0;
border-bottom:1px solid #eee;
">

<input type="checkbox"
${checked}
onchange="toggleRotina('${r.id}',this.checked)">

<span style="flex:1;text-align:left">
${r.rotina_modelos?.titulo ?? "-"}
</span>

</div>

`;

});

html+=`</div>`;

}

document.getElementById("historicoLista").innerHTML=html;

}

async function concluirRotina(id){

const user=JSON.parse(localStorage.getItem("HC_USER"));

const {error}=await db
.from("rotina_execucao")
.update({
status:"concluida",
executado_por:user?.id,
horario_execucao:new Date()
})
.eq("id",id);

if(error){
console.error(error);
alert("Erro ao concluir rotina.");
return;
}

carregarHistoricoRotinas();
carregarGrafico();

}

/* TABELA ROTINAS */

async function carregarTabelaRotinas(){

const hoje = new Date().toISOString().split("T")[0];

const {data,error} = await db
.from("rotina_execucao")
.select(`
id,
status,
data,
paciente_id,
pacientes:paciente_id(nome_completo),
rotina_modelos:modelo_id(titulo)
`)
.eq("empresa_id",EMPRESA_ID)
.eq("data",hoje);

if(error){
console.error(error);
return;
}

let pacientes={};

data.forEach(r=>{

let pid=r.paciente_id;

if(!pacientes[pid]){
pacientes[pid]={
nome:r.pacientes?.nome_completo ?? "Paciente",
rotinas:{}
};
}

pacientes[pid].rotinas[r.rotina_modelos?.titulo]=r;

});

let html=`

<h3>Rotinas do dia</h3>

<table class="tabela-rotinas">

<tr>
<th>Paciente</th>
<th>Banho</th>
<th>Fraldas</th>
<th>Água</th>
<th>Café</th>
<th>Almoço</th>
<th>Suco</th>
<th>Jantar</th>
<th>Outros</th>
</tr>

`;

for(let pid in pacientes){

let p=pacientes[pid];

html+=`<tr><td>${p.nome}</td>`;

const colunas=[
"Banho",
"Trocar Fraldas",
"Tomar Agua",
"Cafe da Manha",
"Almoco",
"Suco",
"Jantar",
"Outros"
];

colunas.forEach(nome=>{

let rotina=p.rotinas[nome];

if(rotina){

let checked = rotina.status==="concluida" ? "checked" : "";

html+=`

<td>
<input type="checkbox"
${checked}
onchange="toggleRotina('${rotina.id}',this.checked)">
</td>

`;

}else{

html+=`<td>-</td>`;

}

});

html+=`</tr>`;

}

html+=`</table>`;

document.getElementById("historicoLista").innerHTML=html;

}

/* TOGGLE ROTINA */

async function toggleRotina(id,checked){

const user = JSON.parse(localStorage.getItem("HC_USER")) || {};

let status = checked ? "concluida" : "pendente";

const {error}=await db
.from("rotina_execucao")
.update({
status:status,
executado_por:user?.id,
horario_execucao:new Date().toISOString()
})
.eq("id",id);

if(error){
console.log(error);
alert("Erro ao atualizar rotina.");
}

await carregarHistoricoRotinas();
await carregarGrafico();
}


/* HISTORICO CLINICO */

async function carregarHistoricoClinico(){

const {data,error}=await db
.from("pacientes")
.select(`
nome_completo,
data_nascimento,
has,
dm,
da,
cardiopatia,
acamado,
dieta_especial,
outras_comorbidades,
grau_risco
`)
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo");

if(error){
console.log(error);
return;
}

let html=`
<h3>Quadro Clínico dos Pacientes</h3>

<table class="tabela-clinica">

<tr>
<th>Paciente</th>
<th>Idade</th>
<th>HAS</th>
<th>DM</th>
<th>DA</th>
<th>Cardio</th>
<th>Acamado</th>
<th>Dieta</th>
<th>Outras</th>
<th>Risco</th>
</tr>
`;

data?.forEach(p=>{

let idade = calcularIdade(p.data_nascimento);

let risco="";

if(p.grau_risco==1) risco="🟢";
else if(p.grau_risco==2) risco="🟡";
else if(p.grau_risco>=3) risco="🔴";

html+=`
<tr>

<td class="nome">${p.nome_completo}</td>
<td>${idade}</td>

<td>${p.has ? "✔":""}</td>
<td>${p.dm ? "✔":""}</td>
<td>${p.da ? "✔":""}</td>
<td>${p.cardiopatia ? "✔":""}</td>
<td>${p.acamado ? "✔":""}</td>
<td>${p.dieta_especial ? "✔":""}</td>

<td style="text-align:left">${p.outras_comorbidades ?? "-"}</td>

<td>${risco}</td>

</tr>
`;

});

html+="</table>";

document.getElementById("historicoLista").innerHTML=html;

}

/* MAPA CLINICO */

async function carregarMapaClinico(){

const {data}=await db
.from("pacientes")
.select("has,dm,da,cardiopatia,acamado,dieta_especial,grau_risco")
.eq("empresa_id",EMPRESA_ID);

let total=data.length;

let has=0,dm=0,da=0,cardio=0,acamado=0,dieta=0;
let normal=0,atencao=0,alto=0;

data.forEach(p=>{

if(p.has)has++;
if(p.dm)dm++;
if(p.da)da++;
if(p.cardiopatia)cardio++;
if(p.acamado)acamado++;
if(p.dieta_especial)dieta++;

if(p.grau_risco==1)normal++;
else if(p.grau_risco==2)atencao++;
else alto++;

});

document.getElementById("mapaClinico").innerHTML=`

<div class="mapa-clinico">

<div class="card-mapa"><b>Pacientes</b><span>${total}</span></div>
<div class="card-mapa"><b>HAS</b><span>${has}</span></div>
<div class="card-mapa"><b>DM</b><span>${dm}</span></div>
<div class="card-mapa"><b>Demência</b><span>${da}</span></div>
<div class="card-mapa"><b>Cardio</b><span>${cardio}</span></div>
<div class="card-mapa"><b>Acamados</b><span>${acamado}</span></div>
<div class="card-mapa"><b>Dieta</b><span>${dieta}</span></div>

<div class="alerta-enfermagem">

<span class="alerta-pill alerta-normal">🟢 ${normal}</span>
<span class="alerta-pill alerta-atencao">🟡 ${atencao}</span>
<span class="alerta-pill alerta-alto">🔴 ${alto}</span>

</div>

</div>

`;

}

/* GRAFICO */

async function carregarGrafico(){

const {data}=await db
.from("rotina_execucao")
.select("status")
.eq("empresa_id",EMPRESA_ID);

let c=0,p=0,a=0;

data?.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;
});

if(graficoInstitucional){
graficoInstitucional.destroy();
}

graficoInstitucional=new Chart(
document.getElementById("graficoInstitucional"),
{
type:"bar",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{
data:[c,p,a],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"]
}]
}
}
);

}


/* LOGIN */

async function login(){

const email=document.getElementById("loginEmail").value.trim();
const senha=document.getElementById("loginSenha").value.trim();

if(!email || !senha){
alert("Informe email e senha.");
return;
}

const {data,error}=await db.rpc('verificar_login',{
p_email:email,
p_senha:senha
});

if(error || !data || data.length===0){
console.error("Erro login:",error);
alert("Usuário ou senha inválidos.");
return;
}

localStorage.setItem("HC_USER",JSON.stringify(data[0]));

await iniciarSistema();

}

function logout(){

localStorage.removeItem("HC_USER");
location.reload();

}

/* INICIAR SISTEMA */

async function iniciarSistema(){

document.getElementById("loginWrapper").style.display="none";
document.getElementById("app").style.display="block";

/* GERAR ROTINAS DO DIA */

try{
await gerarRotinasDoDia();
}catch(e){
console.warn("Erro gerar rotinas:",e);
}

/* CARREGAR SISTEMA */

await carregarPacientes();

if(typeof carregarColaboradores==="function"){
await carregarColaboradores();
}

await carregarMapaClinico();
await carregarHistoricoRotinas();


if(typeof carregarGrafico==="function"){
await carregarGrafico();
}

// carregarAuditoria();

}

/* CALCULAR IDADE */

function calcularIdade(data){

if(!data) return "";

const hoje=new Date();
const nasc=new Date(data);

let idade=hoje.getFullYear()-nasc.getFullYear();

const m=hoje.getMonth()-nasc.getMonth();

if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())){
idade--;
}

return idade;

}

/* AUTO LOGIN */

document.addEventListener("DOMContentLoaded", async ()=>{

const user=localStorage.getItem("HC_USER");

if(user){
await iniciarSistema();
}

});


/* GERAR ROTINAS MANUAL */

async function gerarRotinasManual(){

try{

await gerarRotinasDoDia();

alert("Rotinas do dia geradas com sucesso.");

await carregarHistoricoRotinas();
await carregarGrafico();

}catch(e){

console.error(e);
alert("Erro ao gerar rotinas.");

}

}

</script>
