<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<!-- 001 – LIBS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- 002 – CSS -->
<style>
html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:Arial;background:#f4f6f9}
#app{padding:20px}
h1{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.turnos{margin:20px 0;display:flex;gap:10px;flex-wrap:wrap}
.rotina{background:#fff;padding:18px;border-radius:12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.pendente{border-left:6px solid #e74c3c}
.concluida{border-left:6px solid #2ecc71}
.atrasada{border-left:6px solid #f39c12}
button{padding:8px 14px;border:0;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-executar{background:#3498db;color:#fff}
.btn-disabled{background:#bdc3c7}
canvas{width:100%!important;max-width:600px;margin:20px auto;display:block}
#ceoBox{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
</style>
</head>

<body>

<!-- 003 – LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="emailInput" placeholder="Email">
<input id="senhaInput" type="password" placeholder="Senha">
<button onclick="login()" class="btn-executar" style="width:100%">Entrar</button>
</div>

<!-- 004 – APP -->
<div id="app" style="display:none">

<h1>
<span id="tituloTurno">Rotinas - Turno Manhã</span>
<div style="display:flex;gap:10px;">
<button onclick="toggleCEO()" class="btn-executar">Painel Admin</button>
<button onclick="logout()" class="btn-disabled">Sair</button>
</div>
</h1>

<div id="ceoBox" style="display:none"></div>

<div class="turnos">
<button onclick="carregarRotinas('manhã')">Turno Manhã</button>
<button onclick="carregarRotinas('tarde')">Turno Tarde</button>
<button onclick="carregarRotinas('noite')">Turno Noite</button>
</div>

<canvas id="graficoTurno"></canvas>
<div id="lista"></div>

<hr style="margin:40px 0">

<h2>Histórico Completo</h2>
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistorico()" class="btn-executar">Filtrar</button>
<canvas id="graficoProfissional"></canvas>
<div id="historicoLista"></div>

</div>

<!-- 005 – SCRIPT -->
<script>

/* 006 – CONFIG */
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let user=null,nivel=null,grafico=null,graficoProf=null;
/* ================================
   CONTROLE DE PERFIS
================================ */
function isGestao(){return["admin","supervisor"].includes(nivel);}
function isSaude(){return["medico","enfermeiro","fisioterapeuta"].includes(nivel);}
function isExecucao(){return["cuidador","colaborador"].includes(nivel);}
function isVisualizacao(){return nivel==="visualizador";}
/* ================================
   LOGIN
================================ */
async function login(){
const email=emailInput.value.trim();
const senha=senhaInput.value;
const {data,error}=await db.auth.signInWithPassword({email,password:senha});
if(error){alert(error.message);return;}
user=data.user;
await carregarNivel();
iniciarApp();
}

async function logout(){
await db.auth.signOut();
location.reload();
}
/* ================================
   PERFIL
================================ */
async function carregarNivel(){
const {data,error}=await db.from("perfis")
.select("nivel")
.eq("usuario_id",user.id)
.maybeSingle();
if(error){console.error(error);nivel=null;return;}
nivel=data?.nivel||null;
console.log("Perfil:",nivel);
}

/* ================================
   AUTO SESSION
================================ */
db.auth.getSession().then(async({data})=>{
if(data.session){
user=data.session.user;
await carregarNivel();
iniciarApp();
}
});

/* ================================
   INICIAR APP
================================ */
function iniciarApp(){
loginBox.style.display="none";
app.style.display="block";
carregarRotinas("manha");
}

/* ================================
   ROTINAS
================================ */
async function carregarRotinas(turno){
tituloTurno.innerText=`Rotinas - Turno ${turno}`;
const {data,error}=await db.rpc("rotina_completa_por_turno",{p_empresa_id:EMPRESA_ID,p_turno:turno});
if(error){console.error(error);return;}
lista.innerHTML="";
let c=0,p=0,a=0;

data?.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;

let botao="";
if(r.status==="concluida"){
botao=`<button class="btn-disabled">Concluída</button>`;
}
else if(isGestao()||isSaude()||isExecucao()){
botao=`<button class="btn-executar" onclick="executar('${r.id}','${turno}')">Executar</button>`;
}
else{
botao=`<button class="btn-disabled">Sem Permissão</button>`;
}

lista.innerHTML+=`
<div class="rotina ${r.status}">
<div>
<strong>${r.horario_execucao||"--:--"}</strong>
${r.titulo}<br>
Paciente: ${r.paciente_nome}<br>
<small>Profissional: ${r.profissional_nome||"—"}</small>
</div>
${botao}
</div>`;
});

atualizarGrafico(c,p,a);
}

async function executar(id,turno){
await db.rpc("executar_rotina",{p_rotina_id:id,p_usuario_id:user.id});
carregarRotinas(turno);
}

/* ================================
   GRAFICO
================================ */
function atualizarGrafico(c,p,a){
const ctx=graficoTurno.getContext("2d");
if(grafico)grafico.destroy();
grafico=new Chart(ctx,{type:"doughnut",data:{labels:["Concluídas","Pendentes","Atrasadas"],datasets:[{data:[c,p,a],backgroundColor:["#2ecc71","#e74c3c","#f39c12"]}]}})
}

/* ================================
   HISTÓRICO
================================ */
async function carregarHistorico(){
let query=db.from("historico_completo").select("*");
if(histInicio.value)query=query.gte("data",histInicio.value);
if(histFim.value)query=query.lte("data",histFim.value);
const {data}=await query;
historicoLista.innerHTML="";
data?.forEach(r=>{
historicoLista.innerHTML+=`
<div class="rotina ${r.status}">
<div>
<strong>${r.data}</strong><br>
${r.paciente_nome}<br>
Profissional: ${r.profissional_nome||"Não identificado"}
</div>
</div>`;
});
}

/* ================================
   PAINEL ADMIN
================================ */
function toggleCEO(){
if(!isGestao()){
alert("Acesso restrito à gestão.");
return;
}
ceoBox.style.display=ceoBox.style.display==="none"?"block":"none";
if(ceoBox.style.display==="block"){
ceoBox.innerHTML=`
<h2>Painel Administrativo</h2>
<div style="display:flex;gap:10px;flex-wrap:wrap;">
<button onclick="carregarPacientes()" class="btn-executar">Pacientes</button>
<button onclick="carregarUsuarios()" class="btn-executar">Usuários</button>
<button onclick="carregarRotinasModelos()" class="btn-executar">Rotinas</button>
</div>
<div id="ceoConteudo" style="margin-top:20px;"></div>`;
}
}

/* ================================
   PACIENTES
================================ */
async function carregarPacientes(){
const {data}=await db.from("pacientes").select("id,nome").order("nome");
let html="<h3>Selecionar Paciente</h3>";
html+="<select onchange='verPaciente(this.value)' style='padding:6px;width:300px'>";
html+="<option value=''>Escolha...</option>";
data?.forEach(p=>{
html+=`<option value="${p.id}">${p.nome}</option>`;
});
html+="</select><div id='detalhePaciente'></div>";
document.getElementById("ceoConteudo").innerHTML=html;
}

async function verPaciente(id){
if(!id)return;
const {data:paciente}=await db.from("pacientes").select("*").eq("id",id).single();
const {data:rotinas}=await db.from("rotina_modelos").select("*").eq("paciente_id",id);
const {data:exec}=await db.from("rotina_execucao").select("*").eq("paciente_id",id).order("data_execucao",{ascending:false});

let html=`<h2>${paciente.nome}</h2>`;
html+=`<p><strong>Nascimento:</strong> ${paciente.data_nascimento||"-"}</p>`;
html+="<h3>Rotinas</h3>";
rotinas?.forEach(r=>{
html+=`<div class="rotina"><div>${r.titulo} - ${r.turno} - ${r.horario||"--:--"}</div></div>`;
});
html+="<h3>Histórico</h3>";
exec?.forEach(e=>{
html+=`<div class="rotina"><div>${e.data_execucao} - ${e.status}</div></div>`;
});
document.getElementById("detalhePaciente").innerHTML=html;
}

/* ================================
   MODELOS DE ROTINA
================================ */
async function carregarRotinasModelos(){
const {data}=await db.from("rotina_modelos").select("*").order("titulo");
let html="<h3>Modelos de Rotina</h3>";
data?.forEach(r=>{
html+=`<div class="rotina"><div>${r.titulo} - ${r.turno}</div></div>`;
});
document.getElementById("ceoConteudo").innerHTML=html;
}
/* ================================
   PROFISSIONAIS
================================ */
async function carregarUsuarios(){
  const { data: usuarios } = await db
    .from("perfis")
    .select(`
      usuario_id,
      nivel,
      auth.users (
        email
      )
    `);
  let html = "<h3>Usuários e Níveis</h3>";
  html += `
    <table style="width:100%;border-collapse:collapse;">
      <tr style="background:#eee">
        <th style="padding:8px;text-align:left">Email</th>
        <th style="padding:8px;text-align:left">Nível</th>
        <th style="padding:8px;text-align:left">Alterar</th>
      </tr>
  `;
  usuarios?.forEach(u=>{
    html += `
      <tr>
        <td style="padding:8px">${u.users?.email || "-"}</td>
        <td style="padding:8px">${u.nivel}</td>
        <td style="padding:8px">
          <select onchange="alterarNivel('${u.usuario_id}', this.value)">
            ${gerarOptions(u.nivel)}
          </select>
        </td>
      </tr>
    `;
  });
  html += "</table>";
  document.getElementById("ceoConteudo").innerHTML = html;
}

/* ================================
   GERAR OPTIONS DE NÍVEL
================================ */
function gerarOptions(nivelAtual){
const niveis=[
"admin",
"supervisor",
"colaborador",
"enfermeiro",
"medico",
"fisioterapeuta",
"cuidador",
"visualizador"
];
return niveis.map(n=>`<option value="${n}" ${n===nivelAtual?"selected":""}>${n}</option>`).join("");
}

/* ================================
   ALTERAR NÍVEL
================================ */
async function alterarNivel(usuarioId,novoNivel){
const {error}=await db
.from("perfis")
.update({nivel:novoNivel})
.eq("usuario_id",usuarioId);
if(error){
alert("Erro ao alterar nível");
console.error(error);
return;
}
alert("Nível atualizado com sucesso!");
}
</script>

</body>
</html>
