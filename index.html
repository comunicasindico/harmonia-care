<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Harmonia Care</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

#app{
padding:30px;
}

h1{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 16px;
border:0;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-primary{background:#3498db;color:#fff}
.btn-secondary{background:#555;color:#fff}
.btn-success{background:#2ecc71;color:#fff}

.box{
background:#fff;
padding:25px;
border-radius:12px;
margin-top:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

.status-pendente{color:#e67e22;font-weight:bold}
.status-executado{color:#2ecc71;font-weight:bold}
.status-atrasado{color:#e74c3c;font-weight:bold}

</style>
</head>

<body>

<div id="app">

<h1>
<span>Harmonia Care</span>
<button onclick="logout()" class="btn-secondary">Sair</button>
</h1>

<h2>Painel Enfermagem</h2>

<button onclick="gerarRotinas()" class="btn-primary">Gerar Rotinas</button>
<button onclick="carregarTudo()" class="btn-secondary">Atualizar</button>

<div class="box">
<h3>Ranking da Equipe</h3>
<div id="ranking"></div>
</div>

<div class="box">
<h3>Rotinas do Turno</h3>
<table>
<thead>
<tr>
<th>Paciente</th>
<th>Rotina</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="rotinas"></tbody>
</table>
</div>

</div>

<script>

/* SUPABASE */
const SUPABASE_URL = "https://whvwqektkinnhdprehss.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);
 
/* DETECTAR TURNO */
function turnoAtual(){
const h = new Date().getHours()
if(h>=5 && h<12) return "MANHÃ"
if(h>=12 && h<18) return "TARDE"
return "NOITE"
}

/* GERAR ROTINAS */
async function gerarRotinas(){
const {error} = await supabase.rpc("gerar_rotinas_do_dia")
if(error){
alert("Erro ao gerar rotinas")
return
}
carregarTudo()
}

/* CARREGAR ROTINAS */
async function carregarRotinas(){
const turno = turnoAtual()
const {data,error} = await supabase
.from("vw_rotinas_painel")
.select("*")
.eq("data", new Date().toISOString().slice(0,10))
.eq("turno", turno)
.order("paciente")
.limit(1000)
if(error){
console.error("Erro ao carregar rotinas:",error)
return
}
let html=""
if(!data || data.length===0){
document.getElementById("rotinas").innerHTML=
`<tr><td colspan="4">Nenhuma rotina encontrada</td></tr>`
return
}
data.forEach(r=>{
html+=`
<tr>
<td>${r.paciente}</td>
<td>${r.rotina}</td>
<td class="status-${r.status}">${r.status}</td>
<td>
${r.status!=="executado"
? `<button onclick="executar('${r.id}')" class="btn-success">Executar</button>`
: ""}
</td>
</tr>
`
})
document.getElementById("rotinas").innerHTML=html
}

/* EXECUTAR ROTINA */

async function executar(id){

const {error} = await supabase
.from("rotinas_execucao")
.update({
status:"executado",
horario_executado:new Date()
})
.eq("id",id)

if(error)return

carregarTudo()

}

/* RANKING EQUIPE */

async function carregarRanking(){

const hoje = new Date().toISOString().slice(0,10)

const {data} = await supabase
.from("rotinas_execucao")
.select("executado_por")
.eq("data",hoje)
.eq("status","executado")

let ranking={}

data.forEach(r=>{
if(!r.executado_por)return
ranking[r.executado_por]=(ranking[r.executado_por]||0)+1
})

let html="<table>"

for(let k in ranking){

html+=`
<tr>
<td>${k}</td>
<td>${ranking[k]}</td>
</tr>
`

}

html+="</table>"

document.getElementById("ranking").innerHTML=html

}

/* CARREGAR TUDO */

function carregarTudo(){

carregarRotinas()
carregarRanking()

}

/* LOGOUT */

function logout(){

location.reload()

}

/* AUTO LOAD */

carregarTudo()

</script>

</body>
</html>
