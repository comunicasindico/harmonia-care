/* ======================================================

/* ======================================================
014 CARREGAR ROTINAS
====================================================== */
async function carregarRotinas(){

.from("vw_rotinas_painel")
.select("*")
.eq("turno",TURNO_ATUAL)

if(error){
console.log(error)
return
}

if(!data || data.length===0){
atualizarPainelHospital([])
atualizarPainelCritico([])
document.getElementById("rotinas").innerHTML="<tr><td colspan='3'>Nenhuma rotina encontrada</td></tr>"
return
}

atualizarPainelCritico(data)

renderizarRotinas(data)

}
/* ======================================================
015 EXECUTAR ROTINA
====================================================== */
async function executarRotina(id){
const usuario_id=localStorage.getItem("usuario_id")

const {data}=await db
.from("rotinas_execucao")
.select("status")
.eq("id",id)
.single()

if(data?.status==="executado"){
alert("Rotina já executada.")
return
}

const {error}=await db
.from("rotinas_execucao")
.update({
status:"executado",
executado_por:usuario_id
})
.eq("id",id)

if(error){
alert(error.message)
return
}

carregarRotinas()

}
/* ======================================================
016 BUSCAR HISTÓRICO
====================================================== */
async function buscarHistorico(){
const paciente=document.getElementById("buscaPaciente").value
const dataInicio=document.getElementById("dataInicio").value
const dataFim=document.getElementById("dataFim").value
const rotina=document.getElementById("buscaRotina").value
const profissional=document.getElementById("buscaProfissional").value
let query=db
.from("vw_rotinas_painel")
.select("*")
.order("paciente",{ascending:true})

if(paciente && paciente!==""){
query=query.eq("paciente_id",paciente)
}
if(rotina){
query=query.eq("rotina",rotina)
}
if(profissional){
query=query.eq("executado_por",profissional)
}
if(dataInicio){
query=query.gte("data",dataInicio)
}
if(dataFim){
query=query.lte("data",dataFim)
}
const {data,error}=await query
if(error){
console.log(error)
return
}
if(!data||data.length===0){
document.getElementById("rotinas").innerHTML=
"<tr><td colspan='3'>Nenhum registro encontrado</td></tr>"
return
}

renderizarRotinas(data)

}

/* ======================================================
017 RENDERIZAR ROTINAS
====================================================== */
function renderizarRotinas(data){

let pacientes={}
let executadas=0
let pendentes=0
let atrasadas=0

data.forEach(r=>{

if(!pacientes[r.paciente]){
pacientes[r.paciente]={rotinas:[],total:0,ok:0}
}

pacientes[r.paciente].total++

if(r.status==="executado"){
executadas++
pacientes[r.paciente].ok++
}

if(r.status==="pendente")pendentes++
if(r.status==="atrasado")atrasadas++

let status="🔴"
let classe="status-pendente"

if(r.status==="executado"){status="✔";classe="status-executado"}
if(r.status==="atrasado"){status="⚠";classe="status-atrasado"}

pacientes[r.paciente].rotinas.push({
nome:r.rotina,
html:`
<tr onclick="executarRotina('${r.id}')">
<td>${r.rotina}</td>
<td class="${classe}">${status}</td>
</tr>
`
})

})

let html=""

let listaPacientes = Object.keys(pacientes)

listaPacientes.sort((a,b)=>{
let pa = pacientes[a].ok === pacientes[a].total ? 1 : 0
let pb = pacientes[b].ok === pacientes[b].total ? 1 : 0
if(pa !== pb) return pa - pb
return a.localeCompare(b)
})

listaPacientes.forEach(p=>{

let total=pacientes[p].total
let ok=pacientes[p].ok

let progresso=Math.round((ok/total)*100)

let cor="#f39c12"
if(progresso>=80)cor="#2ecc71"
if(progresso<40)cor="#e74c3c"

let barra=`
<div style="width:140px">
<div style="font-size:11px">${progresso}%</div>
<div style="background:#eee;height:6px;border-radius:6px">
<div style="width:${progresso}%;background:${cor};height:6px;border-radius:6px"></div>
</div>
</div>
`

let listaRotinas=pacientes[p].rotinas

if(ok===total){
listaRotinas=[...listaRotinas].sort((a,b)=>a.nome.localeCompare(b.nome))
}

let tabela=`
<table style="width:100%">
${listaRotinas.map(r=>r.html).join("")}
</table>
`

html+=`
<tr>
<td style="font-weight:600">${p}</td>
<td>${barra}</td>
<td>${tabela}</td>
</tr>
`

})

document.getElementById("rotinas").innerHTML=html

document.getElementById("contadorExecutadas").innerText=executadas
document.getElementById("contadorPendentes").innerText=pendentes
document.getElementById("contadorAtrasadas").innerText=atrasadas

}
/* ======================================================
018 CARREGAR CLÍNICO
====================================================== */

/* ======================================================
018A DATA PADRÃO DO DIA
====================================================== */
function definirDataHoje(){

const hoje = new Date()

const ano = hoje.getFullYear()
const mes = String(hoje.getMonth()+1).padStart(2,"0")

/* ======================================================
021 PAINEL ROTINAS CRÍTICAS
====================================================== */
function atualizarPainelCritico(data){

let rotinas={}

data.forEach(r=>{

if(!rotinas[r.rotina]){
rotinas[r.rotina]={pendente:0,executado:0}
}

if(r.status==="executado"){
rotinas[r.rotina].executado++
}else{
rotinas[r.rotina].pendente++
}
})
let html=""
Object.keys(rotinas).forEach(r=>{
let faltam=rotinas[r].pendente
if(faltam>0){
html+=`
<div style="background:#e74c3c;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px">
⚠ ${r} → faltam ${faltam}
</div>
`
}
})
document.getElementById("painelCritico").innerHTML=html
}

/* ======================================================
024 GERAR PDF
====================================================== */
async function gerarPDF(){

const { jsPDF } = window.jspdf

let linhas = []

const tabela = document.querySelectorAll("#rotinas tr")

tabela.forEach(tr=>{

let colunas = tr.querySelectorAll("td")

if(colunas.length>=3){

let paciente = colunas[0].innerText.trim()

let rotinas = colunas[2].innerText
.replace(/\n/g," | ")
.trim()

linhas.push([paciente,rotinas])

}

})

const doc = new jsPDF()

doc.setFontSize(16)
doc.text("Relatório de Rotinas - Harmonia Care",20,20)

let y = 40

linhas.forEach(l=>{

doc.setFontSize(10)

doc.text(l[0],20,y)
doc.text(l[1],80,y)

y+=10

if(y>280){
doc.addPage()
y=20
}

})

doc.save("relatorio-rotinas.pdf")

}
