<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

#app{padding:30px}

h1{
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:10px 16px;
border:0;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-executar{background:#3498db;color:#fff}
.btn-secundario{background:#555;color:#fff}
.btn-disabled{background:#bdc3c7}

/* DASHBOARD */
.dashboard-executivo{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin:20px 0;
}

.card-dash{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
text-align:center;
}

/* LAYOUT PRINCIPAL */
.layout-hospital{
display:grid;
grid-template-columns:1fr 1.2fr;
gap:40px;
align-items:start;
}

.col-esquerda{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.select-box{
margin-bottom:25px;
}

.select-box select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

.ranking-table{
width:100%;
border-collapse:collapse;
}

.ranking-table th,
.ranking-table td{
padding:8px;
border-bottom:1px solid #eee;
}

.ranking-table th{
background:#f4f6f9;
text-align:left;
}

.timeline-item{
background:#fff;
padding:12px;
margin-bottom:8px;
border-left:4px solid #3498db;
border-radius:6px;
}

.section{
margin-top:40px;
}

.grafico-box{
margin-top:40px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

@media(max-width:1000px){
.layout-hospital{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div id="app">

<h1>
<span>Harmonia Care</span>
<button onclick="logout()" class="btn-disabled">Sair</button>
</h1>

<!-- DASHBOARD -->
<div class="dashboard-executivo">
<div class="card-dash"><h4>👥 Pacientes</h4><span id="dashPacientes">0</span></div>
<div class="card-dash"><h4>🚨 Críticos</h4><span id="dashCriticos">0</span></div>
<div class="card-dash"><h4>⏳ Atrasos</h4><span id="dashAtrasos">0</span></div>
<div class="card-dash"><h4>✅ Concluídas</h4><span id="dashConcluidas">0</span></div>
</div>

<!-- SELEÇÕES + RANKING -->
<div class="layout-hospital">

<div class="col-esquerda">

<div class="select-box">
<h3>Selecionar Paciente</h3>
<select id="selectPaciente" onchange="filtroPaciente()"></select>
</div>

<div class="select-box">
<h3>Selecionar Colaborador</h3>
<select id="selectColaborador" onchange="filtroColaborador()"></select>
</div>

</div>

<div>

<h3>Ranking Crítico</h3>
<div id="rankingBox"></div>

</div>

</div>

<!-- HISTÓRICOS -->
<div class="section">

<h2>Históricos</h2>

<div style="display:flex;gap:10px;margin-bottom:15px;">
<button onclick="carregarHistoricoRotinas()" class="btn-secundario">Rotinas</button>
<button onclick="carregarHistoricoClinico()" class="btn-executar">Clínico</button>
</div>

<div style="display:flex;gap:10px;margin-bottom:20px;">
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistoricoRotinas()" class="btn-executar">Filtrar</button>
</div>

<div id="historicoLista"></div>

</div>

<!-- GRÁFICO -->
<div class="grafico-box">
<h3>Indicador Institucional</h3>
<canvas id="graficoInstitucional"></canvas>
</div>

</div>

<script>

const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let graficoInstitucional=null;

/* ================= PACIENTES ================= */

async function carregarPacientes(){
const {data}=await db.from("pacientes")
.select("id,nome_completo")
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo");

let html=`<option value="todos">Todos os pacientes</option>`;
data?.forEach(p=>{
html+=`<option value="${p.id}">${p.nome_completo}</option>`;
});
selectPaciente.innerHTML=html;
}

/* ================= COLABORADORES ================= */

async function carregarColaboradores(){
const {data}=await db.from("vw_usuarios")
.select("id,nome_completo")
.order("nome_completo");

let html=`<option value="todos">Todos os colaboradores</option>`;
data?.forEach(c=>{
html+=`<option value="${c.id}">${c.nome_completo}</option>`;
});
selectColaborador.innerHTML=html;
}

/* ================= FILTROS ================= */

function filtroPaciente(){
carregarHistoricoRotinas();
}

function filtroColaborador(){
carregarHistoricoRotinas();
}

/* ================= HISTÓRICO ROTINAS ================= */

async function carregarHistoricoRotinas(){

let inicio = histInicio.value;
let fim = histFim.value;
let paciente = selectPaciente.value;

let query = db.from("rotina_execucao")
.select(`
data,
status,
paciente_id,
pacientes (nome_completo),
rotina_modelos (titulo)
`)
.gte("data", inicio)
.lte("data", fim);

if(paciente !== "todos"){
query=query.eq("paciente_id",paciente);
}

const {data}=await query.order("data",{ascending:false});

let html="";

if(!data || data.length===0){
historicoLista.innerHTML="<p>Nenhuma rotina encontrada.</p>";
return;
}

data.forEach(r=>{
html+=`
<div class="timeline-item">
<strong>${r.data}</strong> -
${r.pacientes?.nome_completo} -
${r.rotina_modelos?.titulo}
(${r.status})
</div>`;
});

historicoLista.innerHTML=html;
}

/* ================= HISTÓRICO CLÍNICO ================= */

async function carregarHistoricoClinico(){
const {data}=await db.from("vw_historico_geral")
.select("*")
.order("nome_completo");

let html="<table class='ranking-table'><tr><th>Nome</th><th>Idade</th></tr>";

data?.forEach(p=>{
html+=`<tr><td>${p.nome_completo}</td><td>${p.idade||""}</td></tr>`;
});

html+="</table>";

historicoLista.innerHTML=html;
}

/* ================= RANKING ================= */

async function carregarRankingCriticos(){
const {data}=await db.from("ranking_pacientes_criticos")
.select("*")
.order("score_clinico",{ascending:false})
.limit(10);

let html="<table class='ranking-table'><tr><th>#</th><th>Nome</th><th>Score</th><th>Atrasos</th></tr>";

data?.forEach((p,i)=>{
html+=`<tr>
<td>${i+1}</td>
<td>${p.nome_completo}</td>
<td>${p.score_clinico}</td>
<td>${p.total_atrasos}</td>
</tr>`;
});

html+="</table>";
rankingBox.innerHTML=html;
}

/* ================= GRÁFICO ================= */

async function carregarGrafico(){
if(graficoInstitucional){graficoInstitucional.destroy();}

const {data}=await db.from("rotina_execucao")
.select("status");

let c=0,p=0,a=0;
data?.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;
});

graficoInstitucional=new Chart(
document.getElementById("graficoInstitucional"),
{
type:"bar",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{
data:[c,p,a],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"]
}]
},
options:{responsive:true,maintainAspectRatio:false}
});
}

/* ================= INIT ================= */

carregarPacientes();
carregarColaboradores();
carregarRankingCriticos();
carregarGrafico();

</script>

</body>
</html>
