<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Harmonia Care</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f4f6f9}
#app{padding:30px}

h1{display:flex;justify-content:space-between}

button{
padding:10px 16px;
border:0;
border-radius:8px;
font-weight:bold;
cursor:pointer
}

.btn-primary{background:#3498db;color:#fff}
.btn-secondary{background:#555;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}

.layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-bottom:30px
}

.box{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08)
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc
}

.mapa-clinico{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:20px;
font-size:11px;
}

.card-mapa{
background:#ffffff;
padding:8px 12px;
border-radius:6px;
box-shadow:0 1px 4px rgba(0,0,0,.08);
min-width:80px;
text-align:center;
}

.card-mapa b{
font-size:10px;
color:#666;
display:block;
}

.card-mapa span{
font-size:16px;
font-weight:bold;
}

.alerta-enfermagem{
display:flex;
gap:6px;
margin-top:4px;
font-size:12px;
}

.alerta-pill{
padding:4px 8px;
border-radius:10px;
font-weight:bold;
}

.alerta-normal{background:#eafaf1;color:#1e8449}
.alerta-atencao{background:#fff3cd;color:#7d6608}
.alerta-alto{background:#fdecea;color:#922b21}

.tabela-clinica{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:#fff;
}

.tabela-clinica th{
background:#2c3e50;
color:#fff;
padding:8px;
border:1px solid #ddd;
}

.tabela-clinica td{
padding:6px;
border:1px solid #ddd;
text-align:center;
}

.tabela-clinica td.nome{
text-align:left;
font-weight:bold;
}

.tabela-clinica tr:nth-child(even){
background:#f8f9fa;
}

.grafico-wrapper{
width:600px;
max-width:95%;
height:350px;
background:#fff;
padding:20px;
border-radius:16px;
margin-top:20px;
}

</style>
</head>

<body>

<div id="loginWrapper" style="position:fixed;inset:0;background:#f4f6f9;display:flex;justify-content:center;align-items:center">

<div style="width:350px;background:#fff;padding:30px;border-radius:16px;text-align:center">

<h2>🔐 Harmonia Care</h2>

<input type="email" id="loginEmail" placeholder="Email" style="width:100%;margin-top:10px">
<input type="password" id="loginSenha" placeholder="Senha" style="width:100%;margin-top:10px">

<button onclick="login()" style="margin-top:20px;width:100%">Entrar</button>

</div>
</div>

<div id="app" style="display:none">

<h1>
<span>Harmonia Care</span>
<button onclick="logout()" class="btn-danger">Sair</button>
</h1>

<div id="mapaClinico"></div>

<div class="layout">

<div class="box">
<h3>Selecionar Paciente</h3>
<select id="selectPaciente" onchange="abrirProntuarioPaciente()"></select>
</div>

<div class="box">
<h3>Selecionar Colaborador</h3>
<select id="selectColaborador"></select>
</div>

</div>

<h2>Históricos</h2>

<button onclick="carregarHistoricoRotinas()" class="btn-secondary">Rotinas</button>
<button onclick="carregarHistoricoClinico()" class="btn-primary">Clínico</button>

<div id="historicoLista" style="margin-top:20px"></div>

<div class="grafico-wrapper">
<canvas id="graficoInstitucional"></canvas>
</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";

const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let graficoInstitucional=null;

/* PACIENTES */

async function carregarPacientes(){

const {data}=await db
.from("pacientes")
.select("id,nome_completo")
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo");

let html=`<option value="todos">Todos</option>`;

data?.forEach(p=>{
html+=`<option value="${p.id}">${p.nome_completo}</option>`;
});

document.getElementById("selectPaciente").innerHTML=html;

}

async function carregarColaboradores(){

const {data,error}=await db
.from("usuarios")
.select("id,nome_completo")
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo",{ascending:true});

if(error){
console.log("Erro colaboradores:",error);
return;
}

if(!data){
document.getElementById("selectColaborador").innerHTML="<option>Sem usuários</option>";
return;
}

let html="";

data.forEach(u=>{
html+=`<option value="${u.id}">${u.nome_completo}</option>`;
});

document.getElementById("selectColaborador").innerHTML=html;

}


async function gerarRotinasDoDia(){

const hoje = new Date().toISOString().split("T")[0];

/* PACIENTES */

const {data:pacientes}=await db
.from("pacientes")
.select("id")
.eq("empresa_id",EMPRESA_ID);

/* MODELOS DE ROTINA */

const {data:modelos}=await db
.from("rotina_modelos")
.select("id");

/* VERIFICAR SE JÁ EXISTE */

const {data:existente}=await db
.from("rotina_execucao")
.select("id")
.eq("empresa_id",EMPRESA_ID)
.eq("data",hoje);

if(existente.length>0){
return;
}

/* CRIAR ROTINAS */

let inserts=[];

pacientes.forEach(p=>{

modelos.forEach(m=>{

inserts.push({

empresa_id:EMPRESA_ID,
paciente_id:p.id,
modelo_id:m.id,
data:hoje,
status:"pendente"

});

});

});

if(inserts.length>0){

await db
.from("rotina_execucao")
.insert(inserts);

}

}
async function carregarHistoricoRotinas(){

const dataFiltro = document.getElementById("dataRotina")?.value;

/* CONSULTA SUPABASE CORRIGIDA */

let query = db
.from("rotina_execucao")
.select(`
id,
status,
data,
created_at,
paciente_id,
modelo_id,
pacientes:paciente_id(nome_completo),
rotina_modelos:modelo_id(titulo)
`)
.eq("empresa_id",EMPRESA_ID)
.order("paciente_id",{ascending:true});

if(dataFiltro){
query = query.eq("data",dataFiltro);
}

const {data,error}=await query;

if(error){
console.error("Erro rotinas:",error);
alert("Erro ao carregar rotinas.");
return;
}

if(!data || data.length===0){
document.getElementById("historicoLista").innerHTML="<p>Nenhuma rotina registrada.</p>";
return;
}

/* AGRUPAR POR PACIENTE */

let pacientes = {};

data.forEach(r=>{

const pid = r.paciente_id ?? "sem";

if(!pacientes[pid]){
pacientes[pid]={
nome:r.pacientes?.nome_completo ?? "Paciente",
rotinas:[]
};
}

pacientes[pid].rotinas.push(r);

});

/* CONTADORES */

const total=data.length;
const concluidas=data.filter(r=>r.status==="concluida").length;
const pendentes=total-concluidas;

/* HEADER */

let html=`

<div style="margin-bottom:15px;font-size:14px">

<b>Total de Rotinas:</b> ${total} &nbsp;&nbsp;
<b>✔ Concluídas:</b> ${concluidas} &nbsp;&nbsp;
<b>⏳ Pendentes:</b> ${pendentes}

</div>

`;

/* LISTAR POR PACIENTE */

for(const pid in pacientes){

const p=pacientes[pid];

const totalPaciente=p.rotinas.length;
const concluidasPaciente=p.rotinas.filter(r=>r.status==="concluida").length;

html+=`

<div class="box" style="margin-bottom:15px">

<h3>
${p.nome}
<span style="font-size:12px;color:#888">
(${concluidasPaciente}/${totalPaciente} concluídas)
</span>
</h3>

<table class="tabela-clinica">

<tr>
<th>Rotina</th>
<th>Status</th>
<th>Ação</th>
</tr>

`;

p.rotinas.forEach(r=>{

let status="";
let botao="";

if(r.status==="concluida"){

status="✔ Concluída";

}else{

status="⏳ Pendente";

botao=`
<button class="btn-primary"
onclick="concluirRotina('${r.id}')">
Concluir
</button>
`;

}

html+=`

<tr>

<td style="text-align:left">
${r.rotina_modelos?.titulo ?? "-"}
</td>

<td>
${status}
</td>

<td>
${botao}
</td>

</tr>

`;

});

html+=`
</table>
</div>
`;

}

document.getElementById("historicoLista").innerHTML=html;

}

async function concluirRotina(id){

const user=JSON.parse(localStorage.getItem("HC_USER"));

const {error}=await db
.from("rotina_execucao")
.update({
status:"concluida",
executado_por:user?.id,
horario_execucao:new Date()
})
.eq("id",id);

if(error){
console.error(error);
alert("Erro ao concluir rotina.");
return;
}

carregarHistoricoRotinas();
carregarGrafico();

}
/* HISTORICO CLINICO */

async function carregarHistoricoClinico(){

const {data,error}=await db
.from("pacientes")
.select(`
nome_completo,
data_nascimento,
has,
dm,
da,
cardiopatia,
acamado,
dieta_especial,
outras_comorbidades,
grau_risco
`)
.eq("empresa_id",EMPRESA_ID)
.order("nome_completo");

if(error){
console.log(error);
return;
}

let html=`
<h3>Quadro Clínico dos Pacientes</h3>

<table class="tabela-clinica">

<tr>
<th>Paciente</th>
<th>Idade</th>
<th>HAS</th>
<th>DM</th>
<th>DA</th>
<th>Cardio</th>
<th>Acamado</th>
<th>Dieta</th>
<th>Outras</th>
<th>Risco</th>
</tr>
`;

data?.forEach(p=>{

let idade = calcularIdade(p.data_nascimento);

let risco="";

if(p.grau_risco==1) risco="🟢";
else if(p.grau_risco==2) risco="🟡";
else if(p.grau_risco>=3) risco="🔴";

html+=`
<tr>

<td class="nome">${p.nome_completo}</td>
<td>${idade}</td>

<td>${p.has ? "✔":""}</td>
<td>${p.dm ? "✔":""}</td>
<td>${p.da ? "✔":""}</td>
<td>${p.cardiopatia ? "✔":""}</td>
<td>${p.acamado ? "✔":""}</td>
<td>${p.dieta_especial ? "✔":""}</td>

<td style="text-align:left">${p.outras_comorbidades ?? "-"}</td>

<td>${risco}</td>

</tr>
`;

});

html+="</table>";

document.getElementById("historicoLista").innerHTML=html;

}

/* MAPA CLINICO */

async function carregarMapaClinico(){

const {data}=await db
.from("pacientes")
.select("has,dm,da,cardiopatia,acamado,dieta_especial,grau_risco")
.eq("empresa_id",EMPRESA_ID);

let total=data.length;

let has=0,dm=0,da=0,cardio=0,acamado=0,dieta=0;
let normal=0,atencao=0,alto=0;

data.forEach(p=>{

if(p.has)has++;
if(p.dm)dm++;
if(p.da)da++;
if(p.cardiopatia)cardio++;
if(p.acamado)acamado++;
if(p.dieta_especial)dieta++;

if(p.grau_risco==1)normal++;
else if(p.grau_risco==2)atencao++;
else alto++;

});

document.getElementById("mapaClinico").innerHTML=`

<div class="mapa-clinico">

<div class="card-mapa"><b>Pacientes</b><span>${total}</span></div>
<div class="card-mapa"><b>HAS</b><span>${has}</span></div>
<div class="card-mapa"><b>DM</b><span>${dm}</span></div>
<div class="card-mapa"><b>Demência</b><span>${da}</span></div>
<div class="card-mapa"><b>Cardio</b><span>${cardio}</span></div>
<div class="card-mapa"><b>Acamados</b><span>${acamado}</span></div>
<div class="card-mapa"><b>Dieta</b><span>${dieta}</span></div>

<div class="alerta-enfermagem">

<span class="alerta-pill alerta-normal">🟢 ${normal}</span>
<span class="alerta-pill alerta-atencao">🟡 ${atencao}</span>
<span class="alerta-pill alerta-alto">🔴 ${alto}</span>

</div>

</div>

`;

}

/* GRAFICO */

async function carregarGrafico(){

const {data}=await db
.from("rotina_execucao")
.select("status")
.eq("empresa_id",EMPRESA_ID);

let c=0,p=0,a=0;

data?.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;
});

if(graficoInstitucional){
graficoInstitucional.destroy();
}

graficoInstitucional=new Chart(
document.getElementById("graficoInstitucional"),
{
type:"bar",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{
data:[c,p,a],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"]
}]
}
}
);

}

<script>

/* LOGIN */

async function login(){

const email=document.getElementById("loginEmail").value.trim();
const senha=document.getElementById("loginSenha").value.trim();

if(!email || !senha){
alert("Informe email e senha.");
return;
}

const {data,error}=await db.rpc('verificar_login',{
p_email:email,
p_senha:senha
});

if(error || !data || data.length===0){
console.error("Erro login:",error);
alert("Usuário ou senha inválidos.");
return;
}

localStorage.setItem("HC_USER",JSON.stringify(data[0]));

await iniciarSistema();

}

function logout(){

localStorage.removeItem("HC_USER");
location.reload();

}

/* INICIAR SISTEMA */

async function iniciarSistema(){

document.getElementById("loginWrapper").style.display="none";
document.getElementById("app").style.display="block";

/* GERAR ROTINAS DO DIA */

try{
await gerarRotinasDoDia();
}catch(e){
console.warn("Erro gerar rotinas:",e);
}

/* CARREGAR SISTEMA */

await carregarPacientes();

if(typeof carregarColaboradores==="function"){
await carregarColaboradores();
}

await carregarMapaClinico();
await carregarHistoricoRotinas();
await carregarHistoricoClinico();

if(typeof carregarGrafico==="function"){
await carregarGrafico();
}

if(typeof carregarAuditoria==="function"){
await carregarAuditoria();
}

}

/* CALCULAR IDADE */

function calcularIdade(data){

if(!data) return "";

const hoje=new Date();
const nasc=new Date(data);

let idade=hoje.getFullYear()-nasc.getFullYear();

const m=hoje.getMonth()-nasc.getMonth();

if(m<0 || (m===0 && hoje.getDate()<nasc.getDate())){
idade--;
}

return idade;

}

/* AUTO LOGIN */

document.addEventListener("DOMContentLoaded", async ()=>{

const user=localStorage.getItem("HC_USER");

if(user){
await iniciarSistema();
}

});

</script>

</body>
</html>
