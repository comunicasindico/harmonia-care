<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:Arial;
  background:#f4f6f9;
}

#app{ padding:20px; }

h1{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.turnos{
  margin:20px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.rotina{
  background:#fff;
  padding:18px;
  border-radius:12px;
  margin-bottom:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.pendente{ border-left:6px solid #e74c3c; }
.concluida{ border-left:6px solid #2ecc71; }
.atrasada{ border-left:6px solid #f39c12; }

button{
  padding:8px 14px;
  border:0;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.btn-executar{background:#3498db;color:#fff;}
.btn-disabled{background:#bdc3c7;}

canvas{
  width:100% !important;
  max-width:600px;
  margin:20px auto;
  display:block;
}

#ceoBox{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}
</style>
</head>

<body>

<div id="loginBox">
<h2>Login</h2>
<input id="emailInput" placeholder="Email">
<input id="senhaInput" type="password" placeholder="Senha">
<button onclick="login()" class="btn-executar" style="width:100%">Entrar</button>
</div>

<div id="app" style="display:none">

<h1>
<span id="tituloTurno">Rotinas - Turno Manhã</span>
<div>
<button onclick="toggleCEO()" class="btn-executar">Painel CEO</button>
<button onclick="logout()" class="btn-disabled">Sair</button>
</div>
</h1>

<div id="ceoBox" style="display:none"></div>

<div class="turnos">
<button onclick="carregarRotinas('manha')">Turno Manhã</button>
<button onclick="carregarRotinas('tarde')">Turno Tarde</button>
<button onclick="carregarRotinas('noite')">Turno Noite</button>
</div>

<canvas id="graficoTurno"></canvas>
<div id="lista"></div>

<hr style="margin:40px 0">

<h2>Histórico Completo</h2>

<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistorico()" class="btn-executar">Filtrar</button>

<canvas id="graficoProfissional"></canvas>
<div id="historicoLista"></div>

</div>

<script>

/* CONFIG */
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let user=null,nivel=null,grafico=null,graficoProf=null;

/* LOGIN */
async function login(){
const email=document.getElementById("emailInput").value.trim();
const senha=document.getElementById("senhaInput").value;

const {data,error}=await db.auth.signInWithPassword({email,password:senha});
if(error){alert(error.message);return;}

user=data.user;
await carregarNivel();
iniciarApp();
}

async function logout(){
await db.auth.signOut();
location.reload();
}

async function carregarNivel(){
const {data}=await db.from("perfis")
.select("nivel")
.eq("usuario_id",user.id)
.single();
nivel=data?.nivel||null;
}

db.auth.getSession().then(async({data})=>{
if(data.session){
user=data.session.user;
await carregarNivel();
iniciarApp();
}
});

function iniciarApp(){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
carregarRotinas("manha");
}

/* GRÁFICO TURNO */
function atualizarGrafico(c,p,a){
const ctx=document.getElementById("graficoTurno").getContext("2d");
if(grafico)grafico.destroy();
grafico=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{data:[c,p,a],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"]}]
}
});
}

/* ROTINAS */
async function carregarRotinas(turno){
document.getElementById("tituloTurno").innerText=
`Rotinas - Turno ${turno}`;

const {data,error}=await db.rpc("rotina_completa_por_turno",{
p_empresa_id:EMPRESA_ID,
p_turno:turno
});

if(error){console.error(error);return;}

const lista=document.getElementById("lista");
lista.innerHTML="";

let c=data.filter(r=>r.status==="concluida").length;
let p=data.filter(r=>r.status==="pendente").length;
let a=data.filter(r=>r.status==="atrasado").length;
atualizarGrafico(c,p,a);

data.forEach(r=>{
let classe="rotina "+r.status;

lista.innerHTML+=`
<div class="${classe}">
<div>
<strong>${r.horario_execucao ?? "--:--"}</strong>
${r.titulo}<br>
Paciente: ${r.paciente_nome}<br>
<small>Profissional: ${r.profissional_nome || "—"}</small>
</div>
${
r.status==="concluida"
? `<button class="btn-disabled">Concluída</button>`
: `<button class="btn-executar" onclick="executar('${r.id}','${turno}')">Executar</button>`
}
</div>`;
});
}

async function executar(id,turno){
await db.rpc("executar_rotina",{
p_rotina_id:id,
p_usuario_id:user.id
});
carregarRotinas(turno);
}

/* HISTÓRICO */
async function carregarHistorico(){

let inicio=document.getElementById("histInicio").value;
let fim=document.getElementById("histFim").value;

let query=db.from("historico_completo").select("*");

if(inicio) query=query.gte("data",inicio);
if(fim) query=query.lte("data",fim);

const {data,error}=await query;
if(error){console.error(error);return;}

const box=document.getElementById("historicoLista");
box.innerHTML="";

if(!data||data.length===0){
box.innerHTML="<p>Nenhum histórico encontrado.</p>";
return;
}

let contagem={};

data.forEach(r=>{
const nome=r.profissional_nome||"Não identificado";
contagem[nome]=(contagem[nome]||0)+1;

box.innerHTML+=`
<div class="rotina ${r.status}">
<div>
<strong>${r.data}</strong><br>
${r.paciente_nome}<br>
Profissional: ${nome}
</div>
</div>`;
});

gerarGraficoProfissional(contagem);
}

function gerarGraficoProfissional(dados){

const ctx=document.getElementById("graficoProfissional").getContext("2d");
if(graficoProf)graficoProf.destroy();

graficoProf=new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(dados),
datasets:[{
label:"Total Executado",
data:Object.values(dados),
backgroundColor:"#3498db"
}]
}
});
}

/* CEO */
function toggleCEO(){
if(nivel!=="ceo"){alert("Acesso restrito.");return;}
const box=document.getElementById("ceoBox");
box.style.display=box.style.display==="none"?"block":"none";
box.innerHTML="<h3>Painel CEO Ativo</h3>";
}

</script>

</body>
</html>
