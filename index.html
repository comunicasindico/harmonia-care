<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<!-- 001 – LIBS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<!-- 002 – CSS -->
<style>
html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:Arial;background:#f4f6f9}
#app{padding:20px}
h1{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.turnos{margin:20px 0;display:flex;gap:10px;flex-wrap:wrap}

.rotina{background:#fff;padding:18px;border-radius:12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.pendente{border-left:6px solid #e74c3c}
.concluida{border-left:6px solid #2ecc71}
.atrasada{border-left:6px solid #f39c12}

.critico{background:#ffdddd!important;border-left:8px solid #c0392b}

.timeline-item{background:#fff;padding:12px;margin-bottom:8px;border-left:4px solid #3498db;border-radius:6px}

.risco-baixo{color:#2ecc71;font-weight:bold}
.risco-medio{color:#f39c12;font-weight:bold}
.risco-alto{color:#e74c3c;font-weight:bold}

button{padding:8px 14px;border:0;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-executar{background:#3498db;color:#fff}
.btn-disabled{background:#bdc3c7}
.btn-pdf{background:#8e44ad;color:#fff}

canvas{width:100%!important;max-width:600px;margin:20px auto;display:block}

#ceoBox{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px;box-shadow:0 3px 10px rgba(0,0,0,.08)}

.banner-alerta{
position:fixed;top:0;left:0;width:100%;
background:#c0392b;color:#fff;
padding:12px;text-align:center;
font-weight:bold;z-index:999;
display:none;
}

</style>
</head>

<body>

<div id="bannerCritico" class="banner-alerta"></div>

<!-- LOGIN -->
<div id="loginBox">
<h2>Login</h2>
<input id="emailInput" placeholder="Email">
<input id="senhaInput" type="password" placeholder="Senha">
<button onclick="login()" class="btn-executar" style="width:100%">Entrar</button>
</div>

<div id="app" style="display:none">

<h1>
<span id="tituloTurno">Rotinas - Turno Manhã</span>
<div style="display:flex;gap:10px;">
<button onclick="toggleAdmin()" class="btn-executar">Painel Admin</button>
<button onclick="logout()" class="btn-disabled">Sair</button>
</div>
</h1>

<div id="ceoBox" style="display:none"></div>

<div class="turnos">
<button onclick="carregarRotinas('manhã')">Turno Manhã</button>
<button onclick="carregarRotinas('tarde')">Turno Tarde</button>
<button onclick="carregarRotinas('noite')">Turno Noite</button>
</div>

<canvas id="graficoTurno"></canvas>
<div id="lista"></div>

<hr style="margin:40px 0">

<h2>Histórico Completo</h2>
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistorico()" class="btn-executar">Filtrar</button>
<canvas id="graficoProfissional"></canvas>
<div id="historicoLista"></div>

</div>

<script>

/* CONFIG */
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let user=null,nivel=null,grafico=null,graficoPaciente=null;

/* LOGIN */
async function login(){
const {data,error}=await db.auth.signInWithPassword({
email:emailInput.value.trim(),
password:senhaInput.value});
if(error){alert(error.message);return;}
user=data.user;
await carregarNivel();
iniciarApp();}

async function logout(){await db.auth.signOut();location.reload();}

/* PERFIL */
async function carregarNivel(){
const {data}=await db.from("perfis").select("nivel").eq("usuario_id",user.id).maybeSingle();
nivel=data?.nivel||null;}

/* AUTO SESSION */
db.auth.getSession().then(async({data})=>{
if(data.session){user=data.session.user;await carregarNivel();iniciarApp();}});

/* INICIAR */
function iniciarApp(){
loginBox.style.display="none";
app.style.display="block";
const hoje=new Date().toISOString().split("T")[0];
histInicio.value=hoje;
histFim.value=hoje;
carregarRotinas("manhã");
carregarHistorico();}

/* ROTINAS */
async function carregarRotinas(turno){
tituloTurno.innerText=`Rotinas - Turno ${turno}`;
const {data}=await db.rpc("rotina_completa_por_turno",{p_empresa_id:EMPRESA_ID,p_turno:turno});
lista.innerHTML="";
let c=0,p=0,a=0;

data?.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;

if(r.risco==="alto" && r.status==="atrasado"){
bannerCritico.style.display="block";
bannerCritico.innerText=`🚨 ALERTA CRÍTICO: ${r.paciente_nome} está com medicação atrasada!`;
}

lista.innerHTML+=`
<div class="rotina ${r.status} ${r.risco==='alto'?'critico':''}">
<div>
<strong>${r.horario_execucao||"--:--"}</strong>
${r.titulo}<br>
Paciente: <a href="#" onclick="verPaciente('${r.paciente_id}')">${r.paciente_nome}</a><br>
<small>Profissional: ${r.profissional_nome||"—"}</small>
</div>
<button class="btn-executar" onclick="executar('${r.id}','${turno}')">Executar</button>
</div>`;
});
atualizarGrafico(c,p,a);}

/* EXECUTAR */
async function executar(id,turno){
await db.rpc("executar_rotina",{p_rotina_id:id,p_usuario_id:user.id});
carregarRotinas(turno);}

/* GRÁFICO TURNO */
function atualizarGrafico(c,p,a){
const ctx=graficoTurno.getContext("2d");
if(grafico)grafico.destroy();
grafico=new Chart(ctx,{
type:"doughnut",
data:{labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{data:[c,p,a],backgroundColor:["#2ecc71","#e74c3c","#f39c12"]}]}});}

/* HISTÓRICO */
async function carregarHistorico(){
let query=db.from("historico_completo").select("*");
if(histInicio.value)query=query.gte("data",histInicio.value);
if(histFim.value)query=query.lte("data",histFim.value);
const {data}=await query;
historicoLista.innerHTML="";
data?.forEach(r=>{
historicoLista.innerHTML+=`
<div class="timeline-item">
<strong>${r.data}</strong><br>
${r.paciente_nome}<br>
Status: ${r.status}
</div>`;});}

/* VISÃO INDIVIDUAL */
async function verPaciente(id){
const {data}=await db.from("paciente_prontuario").select("*").eq("paciente_id",id);
if(!data||data.length===0)return;

let risco=data[0].grau_risco||"baixo";
let cor=risco==="alto"?"risco-alto":risco==="medio"?"risco-medio":"risco-baixo";

ceoBox.style.display="block";
ceoBox.innerHTML=`
<h2>${data[0].nome_completo}</h2>
<p>Risco: <span class="${cor}">${risco.toUpperCase()}</span></p>
<button onclick="gerarPDF('${data[0].nome_completo}')" class="btn-pdf">Gerar PDF</button>
<canvas id="graficoPaciente"></canvas>
<div id="linhaTempo"></div>`;

let c=0,p=0,a=0;
data.forEach(r=>{
if(r.status==="concluida")c++;
else if(r.status==="pendente")p++;
else a++;
document.getElementById("linhaTempo").innerHTML+=`
<div class="timeline-item">
${r.data_referencia} - ${r.nome_medicamento||"-"} - ${r.status}
</div>`;
});

const ctx=document.getElementById("graficoPaciente").getContext("2d");
if(graficoPaciente)graficoPaciente.destroy();
graficoPaciente=new Chart(ctx,{
type:"bar",
data:{labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{data:[c,p,a],backgroundColor:["#2ecc71","#e74c3c","#f39c12"]}]}});}

/* PDF */
function gerarPDF(nome){
const {jsPDF}=window.jspdf;
const doc=new jsPDF();
doc.text(`Prontuário - ${nome}`,20,20);
doc.save(`${nome}.pdf`);}

</script>
</body>
</html>
