<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>

/* =====================================================
   001 — RESET / BASE GLOBAL
===================================================== */

html,body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  font-family:Arial;
  background:#f4f6f9;
}

#app{padding:20px}

h1{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

canvas{
  width:100%!important;
  max-width:600px;
  margin:20px auto;
  display:block;
}

button{
  padding:8px 14px;
  border:0;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.btn-executar{background:#3498db;color:#fff}
.btn-disabled{background:#bdc3c7}
.btn-pdf{background:#8e44ad;color:#fff}

.banner-alerta{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#c0392b;
  color:#fff;
  padding:12px;
  text-align:center;
  font-weight:bold;
  z-index:999;
  display:none;
}

/* =====================================================
   002 — LAYOUT PRINCIPAL
===================================================== */

.layout-hospital{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
  align-items:start;
}

.col-esquerda{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  position:sticky;
  top:70px;
  height:fit-content;
}

.col-centro{
  min-height:400px;
}

/* =====================================================
   003 — ROTINAS E STATUS
===================================================== */

.turnos{
  margin:20px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.rotina{
  background:#fff;
  padding:18px;
  border-radius:12px;
  margin-bottom:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.pendente{border-left:6px solid #e74c3c}
.concluida{border-left:6px solid #2ecc71}
.atrasada{border-left:6px solid #f39c12}
.critico{background:#ffdddd!important;border-left:8px solid #c0392b}

.timeline-item{
  background:#fff;
  padding:12px;
  margin-bottom:8px;
  border-left:4px solid #3498db;
  border-radius:6px;
}

.risco-baixo{color:#2ecc71;font-weight:bold}
.risco-medio{color:#f39c12;font-weight:bold}
.risco-alto{color:#e74c3c;font-weight:bold}

.status-pendente{color:#e74c3c;font-weight:bold}
.status-concluida{color:#2ecc71;font-weight:bold}

/* =====================================================
   004 — DASHBOARD EXECUTIVO
===================================================== */

.dashboard-executivo{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  margin:20px 0;
}

.card-dash{
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
  text-align:center;
}

.card-dash h4{
  margin:0;
  font-size:14px;
  color:#555;
}

.card-dash span{
  display:block;
  margin-top:8px;
  font-size:24px;
  font-weight:bold;
  color:#2c3e50;
}

/* =====================================================
   005 — PAINÉIS
===================================================== */

.painel-bloco{
  background:#fff;
  padding:15px;
  margin:20px 0;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.item-paciente,
.item-colaborador{
  padding:6px 0;
  border-bottom:1px solid #eee;
}

#ceoBox{
  background:#fff;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

/* =====================================================
   006 — RANKING EXECUTIVO
===================================================== */

.ranking-container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  margin-bottom:25px;
}

.ranking-box,
.grafico-box{
  background:#fff;
  padding:18px;
  border-radius:12px;
  box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.ranking-box h3,
.grafico-box h3{
  margin-top:0;
  font-size:16px;
  color:#2c3e50;
}

.ranking-table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}

.ranking-table th,
.ranking-table td{
  padding:8px 10px;
  border-bottom:1px solid #eee;
  text-align:left;
}

.ranking-table th{
  background:#f4f6f9;
  font-weight:bold;
}

.ranking-table td:nth-child(1),
.ranking-table td:nth-child(3),
.ranking-table td:nth-child(4){
  text-align:center;
  font-weight:bold;
}

/* =====================================================
   007 — LOGIN
===================================================== */

#loginWrapper{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f4f6f9;
}

#loginBox{
  width:350px;
  background:#fff;
  padding:30px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
  display:flex;
  flex-direction:column;
}

#loginBox select,
#loginBox input{
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
  margin-top:5px;
}

/* =====================================================
   008 — RESPONSIVIDADE
===================================================== */

@media(max-width:1024px){

  .layout-hospital{
    grid-template-columns:1fr;
  }

  .col-esquerda{
    position:relative;
    top:0;
  }

  .ranking-container{
    grid-template-columns:1fr;
  }
}

</style>

   
</head>

<body>

<div id="bannerCritico" class="banner-alerta"></div>

<!-- LOGIN CENTRALIZADO -->
<div id="loginWrapper">
  <div id="loginBox">

    <h2>🔐 Harmonia Care</h2>

    <label>Selecione o usuário</label>
    <select id="usuarioSelect"></select>

    <div id="usuarioInfo" style="margin-top:10px;font-weight:bold;"></div>

    <input id="senhaInput" type="password" placeholder="Senha" style="margin-top:15px;">

    <button onclick="login()" class="btn-executar" style="width:100%;margin-top:15px;">
      Entrar
    </button>

  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app" style="display:none">

<h1>
<span id="tituloTurno">Rotinas - Manhã</span>
<div style="display:flex;gap:10px;">
<button onclick="logout()" class="btn-disabled">Sair</button>
</div>
</h1>

<!-- ================= DASHBOARD EXECUTIVO ================= -->
<div class="dashboard-executivo">

<div class="card-dash">
<h4>👥 Pacientes</h4>
<span id="dashPacientes">0</span>
</div>

<div class="card-dash">
<h4>🚨 Críticos</h4>
<span id="dashCriticos">0</span>
</div>

<div class="card-dash">
<h4>⏳ Atrasos</h4>
<span id="dashAtrasos">0</span>
</div>

<div class="card-dash">
<h4>✅ Concluídas</h4>
<span id="dashConcluidas">0</span>
</div>

<div class="card-dash">
<h4>📊 Execução %</h4>
<span id="dashPercentual">0%</span>
</div>

<div class="card-dash">
<h4>💊 Medicações Hoje</h4>
<span id="dashMedicacoes">0</span>
</div>

</div>
<!-- ================= FIM DASHBOARD ================= -->


<!-- ================= BLOCO DE GESTÃO ================= -->
<div class="layout-hospital">

<!-- COLUNA ESQUERDA -->
<div class="col-esquerda">

<h3>🏥 Ranking Crítico</h3>
<div id="rankingBox"></div>

<!-- SELEÇÃO DE PACIENTE -->
<div class="painel-bloco">
<h3>👥 Selecionar Paciente</h3>

<select id="selectPaciente" style="width:100%;padding:8px;border-radius:6px;">
<option value="">Selecione um paciente...</option>
</select>

<button onclick="abrirPacienteSelecionado()" 
class="btn-executar" 
style="margin-top:10px;width:100%;">
Abrir Histórico
</button>
</div>

<!-- LISTA COLABORADORES -->
<div class="painel-bloco">
<h3>🧑‍⚕️ Colaboradores</h3>
<div id="listaColaboradores"></div>
</div>

</div>

<!-- COLUNA CENTRAL -->
<div class="col-centro">
<div class="ranking-container">

  <div class="ranking-box">
    <h3>🏥 Ranking Crítico</h3>
    <div id="rankingBox"></div>
  </div>

  <div class="grafico-box">
    <h3>📊 Indicador Institucional</h3>
    <canvas id="graficoInstitucional"></canvas>
  </div>

</div>
<div class="turnos">
<button onclick="carregarRotinas('manhã')">Manhã</button>
<button onclick="carregarRotinas('tarde')">Tarde</button>
<button onclick="carregarRotinas('noite')">Noite</button>
</div>

<canvas id="graficoTurno"></canvas>
<div id="lista"></div>

</div>

</div>
<!-- ================= FIM BLOCO GESTÃO ================= -->


<hr style="margin:40px 0">

<h2>Histórico Geral</h2>
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistorico()" class="btn-executar">Filtrar</button>
<div id="historicoLista"></div>

<div id="ceoBox" style="display:none"></div>

</div>

<script>
/* =====================================================
   001 – CONFIG
===================================================== */
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let user=null;
let graficoInstitucional=null;

/* =====================================================
   002 – ELEMENTOS DOM
===================================================== */
const usuarioSelect = document.getElementById("usuarioSelect");
const senhaInput = document.getElementById("senhaInput");
const usuarioInfo = document.getElementById("usuarioInfo");
const app = document.getElementById("app");
const tituloTurno = document.getElementById("tituloTurno");

/* =====================================================
   003 – CARREGAR USUÁRIOS
===================================================== */
async function carregarUsuariosLogin(){

const {data,error}=await db
.from("vw_usuarios")
.select("*")
.order("nome_completo");

if(error || !data) return;

let html=`<option value="">Selecione...</option>`;

data.forEach(u=>{
if(!u.ativo) return;
if(!u.nome_completo || !u.cargo) return;

html+=`
<option value="${u.id}" 
data-email="${u.email}"
data-cargo="${u.cargo}"
data-hierarquia="${u.hierarquia}">
${u.nome_completo} (${u.cargo})
</option>`;
});

usuarioSelect.innerHTML=html;
}

usuarioSelect.addEventListener("change",function(){

let selected=this.options[this.selectedIndex];

if(!selected.value){
usuarioInfo.innerHTML="";
return;
}

usuarioInfo.innerHTML=
`Cargo: ${selected.getAttribute("data-cargo")}`;
});

/* =====================================================
   004 – LOGIN
===================================================== */
async function login(){

let selected=usuarioSelect.options[usuarioSelect.selectedIndex];

if(!selected.value){
alert("Selecione um usuário.");
return;
}

let email = selected.getAttribute("data-email");

if(!senhaInput.value){
alert("Digite a senha.");
return;
}

const {data,error}=await db.auth.signInWithPassword({
email:email,
password:senhaInput.value
});

if(error){
alert("Senha incorreta.");
return;
}

const {data:perfil,error:erroPerfil}=await db
.from("vw_usuarios")
.select("*")
.eq("id",data.user.id)
.single();

if(erroPerfil || !perfil){
alert("Perfil não encontrado.");
await db.auth.signOut();
return;
}

if(perfil.ativo === false){
alert("Usuário inativo.");
await db.auth.signOut();
return;
}

user = perfil;

iniciarApp();
}

/* =====================================================
   005 – INICIAR APP
===================================================== */
function iniciarApp(){

document.getElementById("loginWrapper").style.display="none";
app.style.display="block";

tituloTurno.innerText =
`Rotinas - Manhã | ${user.nome_completo} (${user.cargo})`;

if(user.hierarquia > 6){
const rankingContainer = document.querySelector(".ranking-container");
if(rankingContainer) rankingContainer.style.display="none";
}

if(user.hierarquia > 2){
const gestaoUsuarios = document.getElementById("gestaoUsuarios");
if(gestaoUsuarios) gestaoUsuarios.style.display="none";
}

const hoje=new Date().toISOString().split("T")[0];
document.getElementById("histInicio").value=hoje;
document.getElementById("histFim").value=hoje;

carregarRotinas("manhã");
carregarHistorico();
carregarRankingCriticos();
carregarDashboard();
carregarPacientes();
carregarColaboradores();
carregarGraficoInstitucional();
}

/* =====================================================
   006 – ROTINAS
===================================================== */
async function carregarRotinas(turno){

tituloTurno.innerText=`Rotinas - ${turno} | ${user.nome_completo}`;

const {data}=await db.rpc("rotina_completa_por_turno",{
p_empresa_id:EMPRESA_ID,
p_turno:turno
});

const lista=document.getElementById("lista");
lista.innerHTML="";

data?.forEach(r=>{

lista.innerHTML+=`
<div class="rotina ${r.status}">
<div>
<strong>${r.horario_execucao||"--:--"}</strong>
${r.titulo}<br>
Paciente: 
<a href="#" onclick="verPaciente('${r.paciente_id}')">
${r.paciente_nome}
</a>
</div>
<button class="btn-executar" 
onclick="executar('${r.id}','${turno}')">
Executar
</button>
</div>`;

});
}

/* =====================================================
   007 – EXECUTAR
===================================================== */
async function executar(id,turno){

if(user.hierarquia > 8){
alert("Sem permissão para executar.");
return;
}

await db.rpc("executar_rotina",{
p_rotina_id:id,
p_usuario_id:user.id
});

await carregarRotinas(turno);
await carregarRankingCriticos();
await carregarDashboard();
}

/* =====================================================
   008 – RANKING
===================================================== */
async function carregarRankingCriticos(){

const {data}=await db
.from("ranking_pacientes_criticos")
.select("*")
.order("score_clinico",{ascending:false})
.limit(10);

const rankingBox=document.getElementById("rankingBox");

if(!data || data.length===0){
rankingBox.innerHTML="<p>Nenhum paciente crítico.</p>";
return;
}

let html=`<table class="ranking-table">
<thead>
<tr>
<th>#</th>
<th>Nome</th>
<th>Score</th>
<th>Atrasos</th>
</tr>
</thead><tbody>`;

data.forEach((p,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${p.nome_completo}</td>
<td>${p.score_clinico}</td>
<td>${p.total_atrasos}</td>
</tr>`;
});

html+=`</tbody></table>`;

rankingBox.innerHTML=html;
}

/* =====================================================
   009 – COLABORADORES
===================================================== */
async function carregarColaboradores(){

const {data}=await db
.from("vw_usuarios")
.select("nome_completo,cargo")
.order("hierarquia");

let html="";

data?.forEach(u=>{
html+=`
<div class="item-colaborador">
${u.nome_completo} - <strong>${u.cargo}</strong>
</div>`;
});

document.getElementById("listaColaboradores").innerHTML=html;
}

/* =====================================================
   010 – GRÁFICO
===================================================== */
async function carregarGraficoInstitucional(){

const {data}=await db.rpc("rotina_completa_por_turno",{
p_empresa_id:EMPRESA_ID,
p_turno:"manhã"
});

if(!data) return;

let concluidas=0;
let pendentes=0;
let atrasadas=0;

data.forEach(r=>{
if(r.status==="concluida")concluidas++;
else if(r.status==="pendente")pendentes++;
else atrasadas++;
});

const ctx=document.getElementById("graficoInstitucional");

if(!ctx) return;

if(graficoInstitucional) graficoInstitucional.destroy();

graficoInstitucional=new Chart(ctx,{
type:"bar",
data:{
labels:["Concluídas","Pendentes","Atrasadas"],
datasets:[{
data:[concluidas,pendentes,atrasadas],
backgroundColor:["#2ecc71","#e74c3c","#f39c12"]
}]
}
});
}

/* =====================================================
   INIT
===================================================== */
carregarUsuariosLogin();

</script>
</body>
</html>
