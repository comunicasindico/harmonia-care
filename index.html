<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f4f6f9}
#app{padding:30px}

h1{
display:flex;
justify-content:space-between;
align-items:center
}

button{
padding:10px 16px;
border:0;
border-radius:8px;
font-weight:bold;
cursor:pointer
}

.btn-primary{background:#3498db;color:#fff}
.btn-secondary{background:#555;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}

.layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
margin-bottom:30px
}

.box{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08)
}

.timeline-item{
padding:12px;
margin-bottom:8px;
border-radius:6px
}

.status-concluida{
background:#e8f8f0;
border-left:5px solid #2ecc71
}

.status-pendente{
background:#fdecea;
border-left:5px solid #e74c3c
}

.status-atrasado{
background:#fff4e5;
border-left:5px solid #f39c12
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc
}

/* ===== PRONTUÁRIO ===== */

.prontuario-card{
background:#fff;
padding:20px;
border-radius:10px;
margin-top:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1)
}

.prontuario-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin:10px 0
}

.alerta-risco{
background:#e74c3c;
color:#fff;
padding:10px;
border-radius:8px;
margin:10px 0;
font-weight:bold;
text-align:center
}

/* ===== MAPA CLÍNICO ===== */

.mapa-clinico{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
margin-bottom:20px
}

.card-mapa{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1)
}

.card-mapa.risco{
background:#ffe5e5;
border:2px solid #e74c3c
}

/* ===== GRÁFICO ===== */

.grafico-container{
margin-top:40px;
display:flex;
flex-direction:column;
align-items:center
}

.grafico-wrapper{
width:600px;
max-width:95%;
height:350px;
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 4px 15px rgba(0,0,0,.08)
}

#graficoInstitucional{
width:100%!important;
height:100%!important
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.layout{
grid-template-columns:1fr
}

button{
width:100%
}

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginWrapper" style="position:fixed;inset:0;background:#f4f6f9;display:flex;justify-content:center;align-items:center;z-index:9999;">

<div style="width:350px;background:#fff;padding:30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.15);text-align:center;">

<h2>🔐 Harmonia Care</h2>

<input type="email" id="loginEmail" placeholder="Digite seu email" style="width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc">

<input type="password" id="loginSenha" placeholder="Digite a senha" style="width:100%;padding:12px;margin-top:20px;border-radius:8px;border:1px solid #ccc">

<button onclick="login()" style="margin-top:20px;width:100%;padding:12px;border:0;border-radius:8px;background:#3498db;color:#fff;font-weight:bold;">Entrar</button>

</div>
</div>

<!-- APP -->

<div id="app" style="display:none">

<h1>
<span>Harmonia Care</span>
<button onclick="logout()" class="btn-danger">Sair</button>
</h1>

<!-- MAPA CLÍNICO -->
<div id="mapaClinico"></div>

<div class="layout">

<div class="box">
<h3>Selecionar Paciente</h3>
<select id="selectPaciente" onchange="abrirProntuarioPaciente()"></select>
</div>

<div id="prontuarioPaciente"></div>

<div class="box">
<h3>Selecionar Colaborador</h3>
<select id="selectColaborador"></select>
</div>

</div>

<hr>

<h2>Históricos</h2>

<div style="display:flex;gap:10px;margin-bottom:15px;">
<button onclick="carregarHistoricoRotinas()" class="btn-secondary">Rotinas</button>
<button onclick="carregarHistoricoClinico()" class="btn-primary">Clínico</button>
</div>

<div style="margin-bottom:15px;">
<input type="text" id="buscaDinamica" placeholder="Buscar paciente ou rotina..." onkeyup="filtrarBusca()" style="width:100%;">
</div>

<div id="historicoLista"></div>

<div class="grafico-container">
<h3>Indicador Institucional</h3>

<div class="grafico-wrapper">
<canvas id="graficoInstitucional"></canvas>
</div>

</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let graficoInstitucional=null;

/* ================= LOGIN ================= */

async function login(){

const email=document.getElementById("loginEmail").value;
const senha=document.getElementById("loginSenha").value;

const {data,error}=await db.rpc('verificar_login',{
p_email:email,
p_senha:senha
});

if(error || !data || data.length===0){
alert("Usuário ou senha inválidos.");
return;
}

localStorage.setItem("HC_USER",JSON.stringify(data[0]));

iniciarSistema(data[0]);

}

function logout(){
localStorage.removeItem("HC_USER");
location.reload();
}

/* ================= SISTEMA ================= */

function iniciarSistema(usuario){

document.getElementById("loginWrapper").style.display="none";
document.getElementById("app").style.display="block";

carregarPacientes();
carregarColaboradores();
carregarHistoricoRotinas();
carregarHistoricoClinico();
carregarMapaClinico();
carregarGrafico();

}

window.onload=function(){

const user=localStorage.getItem("HC_USER");

if(user){
iniciarSistema(JSON.parse(user));
}

};

</script>

</body>
</html>
