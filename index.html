<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Harmonia Care - Turno</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>

<style>
html,body{margin:0;padding:0;width:100%;min-height:100%;font-family:Arial;background:#f4f6f9}
#app{padding:20px}
h1{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
canvas{width:100%!important;max-width:600px;margin:20px auto;display:block}
button{padding:8px 14px;border:0;border-radius:6px;font-weight:bold;cursor:pointer}
.btn-executar{background:#3498db;color:#fff}
.btn-disabled{background:#bdc3c7}
.btn-pdf{background:#8e44ad;color:#fff}
.banner-alerta{position:fixed;top:0;left:0;width:100%;background:#c0392b;color:#fff;padding:12px;text-align:center;font-weight:bold;z-index:999;display:none}
.layout-hospital{display:grid;grid-template-columns:300px 1fr;gap:20px;align-items:start}
.col-esquerda{background:#fff;padding:15px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08);position:sticky;top:70px;height:fit-content}
.col-centro{min-height:400px}
.turnos{margin:20px 0;display:flex;gap:10px;flex-wrap:wrap}
.rotina{background:#fff;padding:18px;border-radius:12px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.pendente{border-left:6px solid #e74c3c}
.concluida{border-left:6px solid #2ecc71}
.atrasada{border-left:6px solid #f39c12}
.timeline-item{background:#fff;padding:12px;margin-bottom:8px;border-left:4px solid #3498db;border-radius:6px}
.risco-baixo{color:#2ecc71;font-weight:bold}
.risco-medio{color:#f39c12;font-weight:bold}
.risco-alto{color:#e74c3c;font-weight:bold}
.status-pendente{color:#e74c3c;font-weight:bold}
.status-concluida{color:#2ecc71;font-weight:bold}
.dashboard-executivo{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin:20px 0}
.card-dash{background:#fff;padding:15px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08);text-align:center}
.card-dash h4{margin:0;font-size:14px;color:#555}
.card-dash span{display:block;margin-top:8px;font-size:24px;font-weight:bold;color:#2c3e50}
.painel-bloco{background:#fff;padding:15px;margin:20px 0;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.item-colaborador{padding:6px 0;border-bottom:1px solid #eee}
.ranking-container{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:25px}
.ranking-box,.grafico-box{background:#fff;padding:18px;border-radius:12px;box-shadow:0 3px 10px rgba(0,0,0,.08)}
.ranking-table{width:100%;border-collapse:collapse;font-size:14px}
.ranking-table th,.ranking-table td{padding:8px 10px;border-bottom:1px solid #eee;text-align:left}
.ranking-table th{background:#f4f6f9;font-weight:bold}
.ranking-table td:nth-child(1),.ranking-table td:nth-child(3),.ranking-table td:nth-child(4){text-align:center;font-weight:bold}
#loginWrapper{height:100vh;display:flex;justify-content:center;align-items:center;background:#f4f6f9}
#loginBox{width:350px;background:#fff;padding:30px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,.15);display:flex;flex-direction:column}
#loginBox select,#loginBox input{padding:10px;border-radius:6px;border:1px solid #ccc;margin-top:5px}
@media(max-width:1024px){.layout-hospital{grid-template-columns:1fr}.col-esquerda{position:relative;top:0}.ranking-container{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loginWrapper">
  <div id="loginBox">
    <h2>🔐 Harmonia Care</h2>
    <label>Selecione o usuário</label>
    <select id="usuarioSelect"></select>
    <div id="usuarioInfo" style="margin-top:10px;font-weight:bold;"></div>
    <input id="senhaInput" type="password" placeholder="Senha" style="margin-top:15px;">
    <button onclick="login()" class="btn-executar" style="width:100%;margin-top:15px;">Entrar</button>
  </div>
</div>

<div id="app" style="display:none">

<h1>
<span id="tituloTurno">Rotinas</span>
<div><button onclick="logout()" class="btn-disabled">Sair</button></div>
</h1>

<div class="dashboard-executivo">
<div class="card-dash"><h4>👥 Pacientes</h4><span id="dashPacientes">0</span></div>
<div class="card-dash"><h4>🚨 Críticos</h4><span id="dashCriticos">0</span></div>
<div class="card-dash"><h4>⏳ Atrasos</h4><span id="dashAtrasos">0</span></div>
<div class="card-dash"><h4>✅ Concluídas</h4><span id="dashConcluidas">0</span></div>
<div class="card-dash"><h4>📊 Execução %</h4><span id="dashPercentual">0%</span></div>
<div class="card-dash"><h4>💊 Medicações Hoje</h4><span id="dashMedicacoes">0</span></div>
</div>

<div class="layout-hospital">
<div class="col-esquerda">
<div class="painel-bloco">
<h3>👥 Selecionar Paciente</h3>
<select id="selectPaciente" style="width:100%;padding:8px;border-radius:6px;"></select>
<button onclick="abrirPacienteSelecionado()" class="btn-executar" style="margin-top:10px;width:100%;">Abrir Histórico</button>
</div>

<div class="painel-bloco">
<h3>🧑‍⚕️ Colaboradores</h3>
<div id="listaColaboradores"></div>
</div>
</div>

<div class="col-centro">
<div class="ranking-container">
<div class="ranking-box">
<h3>🏥 Ranking Crítico</h3>
<div id="rankingBox"></div>
</div>
<div class="grafico-box">
<h3>📊 Indicador Institucional</h3>
<canvas id="graficoInstitucional"></canvas>
</div>
</div>

<div class="turnos">
<button onclick="carregarRotinas('manhã')">Manhã</button>
<button onclick="carregarRotinas('tarde')">Tarde</button>
<button onclick="carregarRotinas('noite')">Noite</button>
</div>

<div id="lista"></div>
</div>
</div>

<hr style="margin:40px 0">

<h2>Histórico Geral</h2>
<input type="date" id="histInicio">
<input type="date" id="histFim">
<button onclick="carregarHistorico()" class="btn-executar">Filtrar</button>
<div id="historicoLista"></div>

<div id="ceoBox" style="display:none"></div>

</div>

<script>
const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const EMPRESA_ID="d9f678e5-6c7a-485e-895c-cb4791db840e";

let user=null;
let graficoInstitucional=null;

const usuarioSelect=document.getElementById("usuarioSelect");
const senhaInput=document.getElementById("senhaInput");
const usuarioInfo=document.getElementById("usuarioInfo");
const app=document.getElementById("app");
const tituloTurno=document.getElementById("tituloTurno");

async function logout(){
await db.auth.signOut();
app.style.display="none";
document.getElementById("loginWrapper").style.display="flex";
}

async function carregarUsuariosLogin(){
const {data}=await db.from("vw_usuarios").select("*").order("hierarquia");
let html=`<option value="">Selecione...</option>`;
data?.forEach(u=>{
if(!u.ativo||!u.nome_completo)return;
html+=`<option value="${u.id}" data-email="${u.email}" data-cargo="${u.cargo}">${u.nome_completo}</option>`;
});
usuarioSelect.innerHTML=html;
}
usuarioSelect.addEventListener("change",function(){
let s=this.options[this.selectedIndex];
usuarioInfo.innerHTML=s.value?`Cargo: ${s.dataset.cargo}`:"";
});

async function login(){
let s=usuarioSelect.options[usuarioSelect.selectedIndex];
if(!s.value)return alert("Selecione usuário.");
if(!senhaInput.value)return alert("Digite senha.");
const {data,error}=await db.auth.signInWithPassword({email:s.dataset.email,password:senhaInput.value});
if(error)return alert("Senha incorreta.");
const {data:perfil}=await db.from("vw_usuarios").select("*").eq("id",data.user.id).single();
if(!perfil)return;
user=perfil;
iniciarApp();
}

function iniciarApp(){
document.getElementById("loginWrapper").style.display="none";
app.style.display="block";
tituloTurno.innerText=`Rotinas - Manhã | ${user.nome_completo} (${user.cargo})`;
const hoje=new Date().toISOString().split("T")[0];
histInicio.value=hoje;
histFim.value=hoje;
carregarDashboard();
carregarPacientes();
carregarColaboradores();
carregarRotinas("manhã");
carregarRankingCriticos();
carregarGraficoInstitucional();
carregarHistorico();
}

async function carregarPacientes(){

const { data, error } = await db
.from("pacientes")
.select("id,nome_completo")
.eq("empresa_id", EMPRESA_ID)
.order("nome_completo",{ascending:true});

let select = document.getElementById("selectPaciente");

if(error){
select.innerHTML=`<option>Erro ao carregar</option>`;
return;
}

if(!data || data.length===0){
select.innerHTML=`<option>Nenhum paciente cadastrado</option>`;
return;
}

let html = `<option value="">Selecione um paciente...</option>`;

data.forEach(p=>{
if(!p.nome_completo) return;
html += `<option value="${p.id}">${p.nome_completo}</option>`;
});

select.innerHTML = html;

/* 🔥 força atualização visual */
select.value = "";
}

function abrirPacienteSelecionado(){

let id = document.getElementById("selectPaciente").value;

if(!id){
alert("Selecione um paciente.");
return;
}

window.open("?paciente="+id,"_self");
}

async function carregarColaboradores(){
const {data}=await db.from("vw_usuarios").select("nome_completo,cargo").order("hierarquia");
let html="";
data?.forEach(u=>{
html+=`<div class="item-colaborador">${u.nome_completo} - <strong>${u.cargo||""}</strong></div>`;
});
document.getElementById("listaColaboradores").innerHTML=html;
}

async function carregarDashboard(){
const {data}=await db.rpc("rotina_completa_por_turno",{p_empresa_id:EMPRESA_ID,p_turno:"manhã"});
if(!data)return;
let pacientes=new Set(),criticos=0,atrasos=0,concluidas=0,total=data.length;
data.forEach(r=>{
pacientes.add(r.paciente_id);
if(r.risco==="critico")criticos++;
if(r.status==="atrasado")atrasos++;
if(r.status==="concluida")concluidas++;
});
dashPacientes.innerText=pacientes.size;
dashCriticos.innerText=criticos;
dashAtrasos.innerText=atrasos;
dashConcluidas.innerText=concluidas;
dashPercentual.innerText=total?Math.round((concluidas/total)*100)+"%":"0%";
dashMedicacoes.innerText=total;
}

async function carregarRotinas(turno){
const {data}=await db.rpc("rotina_completa_por_turno",{p_empresa_id:EMPRESA_ID,p_turno:turno});
lista.innerHTML="";
data?.forEach(r=>{
lista.innerHTML+=`<div class="rotina ${r.status}">
<div><strong>${r.horario_execucao||"--:--"}</strong> ${r.titulo}<br>Paciente: ${r.paciente_nome}</div>
<button class="btn-executar" onclick="executar('${r.id}','${turno}')">Executar</button>
</div>`;
});
}

async function executar(id,turno){
await db.rpc("executar_rotina",{p_rotina_id:id,p_usuario_id:user.id});
carregarRotinas(turno);
carregarDashboard();
carregarRankingCriticos();
}

async function carregarRankingCriticos(){
const {data}=await db.from("ranking_pacientes_criticos").select("*").order("score_clinico",{ascending:false}).limit(10);
let html=`<table class="ranking-table"><thead><tr><th>#</th><th>Nome</th><th>Score</th><th>Atrasos</th></tr></thead><tbody>`;
data?.forEach((p,i)=>{
html+=`<tr><td>${i+1}</td><td>${p.nome_completo}</td><td>${p.score_clinico}</td><td>${p.total_atrasos}</td></tr>`;
});
html+="</tbody></table>";
rankingBox.innerHTML=html;
}

async function carregarGraficoInstitucional(){
const {data}=await db.rpc("rotina_completa_por_turno",{p_empresa_id:EMPRESA_ID,p_turno:"manhã"});
if(!data)return;
let c=0,p=0,a=0;
data.forEach(r=>{if(r.status==="concluida")c++;else if(r.status==="pendente")p++;else a++;});
if(graficoInstitucional)graficoInstitucional.destroy();
graficoInstitucional=new Chart(graficoInstitucional=document.getElementById("graficoInstitucional"),{
type:"bar",
data:{labels:["Concluídas","Pendentes","Atrasadas"],datasets:[{data:[c,p,a],backgroundColor:["#2ecc71","#e74c3c","#f39c12"]}]}
});
}

async function carregarHistorico(){
let query=db.from("historico_completo").select("*");
if(histInicio.value)query=query.gte("data",histInicio.value);
if(histFim.value)query=query.lte("data",histFim.value);
const {data}=await query;
let html="";
data?.forEach(r=>{
html+=`<div>${r.data} - ${r.paciente_nome} - ${r.titulo} (${r.status})</div>`;
});
historicoLista.innerHTML=html;
}

carregarUsuariosLogin();
</script>

</body>
</html>
