<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Harmonia Care</title>

<link rel="icon" href="logo-harmonia.png">

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="login-box">

<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
<img src="logo-harmonia.png" style="height:38px">
<h2 style="margin:0">Harmonia Care</h2>
</div>

<input id="usuario" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()" class="btn-primary" style="width:100%">
Entrar
</button>

</div>

</div>


<!-- APP -->

<div id="app" style="display:none">

<h1 style="display:flex;justify-content:space-between;align-items:center">

<div style="display:flex;gap:10px;align-items:center">
<img src="logo-harmonia.png" style="height:32px">
<span>Harmonia Care</span>
</div>

<button onclick="logout()" class="btn-danger">
Sair
</button>

</h1>

<div class="menu">

<button onclick="abrirEnfermagem()" class="btn-primary">
Painel Enfermagem
</button>

<button onclick="abrirClinico()" class="btn-secondary">
Painel Clínico
</button>

<button onclick="abrirAdmin()" class="btn-success">
Admin
</button>

<button onclick="gerarPDFGeral()" class="btn-primary">
Gerar PDF
</button>

<button onclick="gerarPDFPaciente()" class="btn-primary">
PDF Paciente
</button>

</div>


<!-- ENFERMAGEM -->

<div id="painelEnfermagem">

<div class="box">

<table>

<thead>
<tr>
<th>Paciente</th>
<th>Progresso</th>
<th>Rotinas</th>
</tr>
</thead>

<tbody id="rotinas"></tbody>

</table>

</div>

</div>


<!-- CLINICO -->

<div id="painelClinico" style="display:none">

<div class="box">

<table>

<thead>

<tr>

<th>Paciente</th>
<th>Idade</th>
<th>HAS</th>
<th>DM</th>
<th>DA</th>
<th>Cardio</th>
<th>Acamado</th>
<th>PA</th>
<th>Dieta</th>
<th>Risco</th>
<th>Outros</th>

</tr>

</thead>

<tbody id="quadroClinico"></tbody>

</table>

</div>

</div>


<!-- ADMIN -->

<div id="painelAdmin" style="display:none">

<div class="box">

<h3>Rotinas</h3>

<table>

<thead>

<tr>
<th>Rotina</th>
<th>Turno</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="listaRotinasAdmin"></tbody>

</table>

</div>

</div>

</div>


<!-- JS -->

<script src="js/supabase.js"></script>
<script src="js/enfermagem.js"></script>
<script src="js/clinico.js"></script>
<script src="js/admin.js"></script>
<script src="js/pdf.js"></script>
<script src="js/app.js"></script>

</body>
</html>
