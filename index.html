<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Harmonia Care</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

#app{
padding:30px;
max-width:1200px;
margin:auto;
}

h1{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

h2{
margin-top:0;
color:#555;
}

button{
padding:10px 16px;
border:0;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.btn-primary{background:#3498db;color:#fff}
.btn-secondary{background:#555;color:#fff}
.btn-success{background:#2ecc71;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
text-align:center;
}

.card h3{
margin:0;
font-size:30px;
}

.card span{
color:#888;
}

.box{
background:#fff;
padding:25px;
border-radius:12px;
margin-top:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:left;
}

.status-pendente{
color:#e67e22;
font-weight:bold;
}

.status-executado{
color:#2ecc71;
font-weight:bold;
}

.status-atrasado{
color:#e74c3c;
font-weight:bold;
}

tr:hover{
background:#fafafa;
}

</style>
</head>

<body>

<div id="app">

<h1>
<span>Harmonia Care</span>
<button onclick="logout()" class="btn-danger">Sair</button>
</h1>

<h2>Painel Enfermagem</h2>

<button onclick="gerarRotinas()" class="btn-primary">Gerar Rotinas</button>
<button onclick="carregarTudo()" class="btn-secondary">Atualizar</button>

<div class="dashboard">

<div class="card">
<h3 id="total">0</h3>
<span>Rotinas</span>
</div>

<div class="card">
<h3 id="pendentes">0</h3>
<span>Pendentes</span>
</div>

<div class="card">
<h3 id="executadas">0</h3>
<span>Executadas</span>
</div>

<div class="card">
<h3 id="atrasadas">0</h3>
<span>Atrasadas</span>
</div>

</div>

<div class="box">
<h3>Ranking da Equipe</h3>
<div id="ranking"></div>
</div>

<div class="box">
<h3>Rotinas do Turno</h3>

<table>

<thead>
<tr>
<th>Paciente</th>
<th>Rotina</th>
<th>Status</th>
<th>Ação</th>
</tr>
</thead>

<tbody id="rotinas"></tbody>

</table>

</div>

</div>

<script>

/* SUPABASE */

const SUPABASE_URL="https://whvwqektkinnhdprehss.supabase.co"

const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU"

const supabase=window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

/* TURNO */

function turnoAtual(){

const h=new Date().getHours()

if(h>=5 && h<12) return "MANHÃ"
if(h>=12 && h<18) return "TARDE"

return "NOITE"

}

/* GERAR ROTINAS */

async function gerarRotinas(){

const {error}=await supabase.rpc("gerar_rotinas_do_dia")

if(error){
alert("Erro ao gerar rotinas")
return
}

carregarTudo()

}

/* EXECUTAR ROTINA */

async function executar(id){

const {error}=await supabase
.from("rotinas_execucao")
.update({
status:"executado",
horario_executado:new Date()
})
.eq("id",id)

if(error)return

carregarTudo()

}

/* ROTINAS */

async function carregarRotinas(){

const turno=turnoAtual()

const hoje=new Date().toISOString().slice(0,10)

const {data,error}=await supabase
.from("vw_rotinas_painel")
.select("*")
.eq("data",hoje)
.eq("turno",turno)
.order("paciente")

if(error)return

let html=""

let pendentes=0
let executadas=0
let atrasadas=0

data.forEach(r=>{

if(r.status==="pendente") pendentes++
if(r.status==="executado") executadas++

html+=`

<tr>

<td>${r.paciente}</td>

<td>${r.rotina}</td>

<td class="status-${r.status}">
${r.status}
</td>

<td>

${r.status!=="executado"

? `<button onclick="executar('${r.id}')" class="btn-success">Executar</button>`

: ""}

</td>

</tr>

`

})

document.getElementById("rotinas").innerHTML=html

document.getElementById("total").innerText=data.length
document.getElementById("pendentes").innerText=pendentes
document.getElementById("executadas").innerText=executadas
document.getElementById("atrasadas").innerText=atrasadas

}

/* RANKING */

async function carregarRanking(){

const hoje=new Date().toISOString().slice(0,10)

const {data}=await supabase
.from("rotinas_execucao")
.select("executado_por")
.eq("data",hoje)
.eq("status","executado")

let ranking={}

data.forEach(r=>{

if(!r.executado_por) return

ranking[r.executado_por]=(ranking[r.executado_por]||0)+1

})

let html="<table>"

for(let k in ranking){

html+=`
<tr>
<td>${k}</td>
<td>${ranking[k]}</td>
</tr>
`

}

html+="</table>"

document.getElementById("ranking").innerHTML=html

}

/* CARREGAR */

function carregarTudo(){

carregarRotinas()

carregarRanking()

}

/* LOGOUT */

function logout(){

location.reload()

}

/* AUTO LOAD */

carregarTudo()

setInterval(carregarTudo,30000)

</script>

</body>
</html>
