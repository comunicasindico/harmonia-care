<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harmonia Care</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
#app{padding:30px}
h1{display:flex;justify-content:space-between;align-items:center}
button{padding:10px 16px;border:0;border-radius:8px;font-weight:bold;cursor:pointer}
.btn-primary{background:#3498db;color:#fff}
.btn-secondary{background:#555;color:#fff}
.btn-danger{background:#e74c3c;color:#fff}
.card{background:#fff;border-radius:12px;padding:20px;margin-top:20px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}
.turno{margin-top:20px}
.rotina{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #eee}
.status-ok{color:green;font-weight:bold}
.status-pendente{color:#e67e22;font-weight:bold}
.status-atrasado{color:red;font-weight:bold}
</style>
</head>

<body>

<div id="app">

<h1>
<span>Harmonia Care</span>
<button onclick="logout()" class="btn-danger">Sair</button>
</h1>

<h2>Painel Enfermagem</h2>

<button onclick="gerarRotinasDoDia()" class="btn-primary">Gerar Rotinas</button>
<button onclick="carregarPainel()" class="btn-secondary">Atualizar</button>

<div class="card">
<h3>Ranking da Equipe</h3>
<canvas id="graficoEquipe"></canvas>
</div>

<div class="card">
<h3>Rotinas do Turno</h3>
<div id="painelRotinas"></div>
</div>

</div>

<script>

const SUPABASE_URL="https://SEU_PROJETO.supabase.co"
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndodndxZWt0a2lubmhkcHJlaHNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTY2MzYsImV4cCI6MjA4Nzg3MjYzNn0.gdTMT25dc4x7YlLQEWHKd-6dM32nKp5mnRwMk_fiEdU";

const {createClient}=supabase
const db=createClient(SUPABASE_URL,SUPABASE_KEY)

let usuarioAtual=null

function logout(){
location.reload()
}

function turnoAtual(){
const h=new Date().getHours()
if(h>=5&&h<12)return"manha"
if(h>=12&&h<18)return"tarde"
return"noite"
}

function statusRotina(r){
if(r.status==="executado")return"status-ok"
const agora=new Date()
const exec=new Date(r.data+"T23:59:59")
if(agora>exec)return"status-atrasado"
return"status-pendente"
}

async function gerarRotinasDoDia(){

const hoje=new Date().toISOString().slice(0,10)

const {data:exist}=await db
.from("rotina_execucao")
.select("id")
.eq("data",hoje)
.limit(1)

if(exist.length){
alert("Rotinas já geradas hoje")
return
}

const {data:pacientes,error:pErro}=await db
.from("pacientes")
.select("id")

if(pErro){alert("Erro pacientes");return}

const {data:modelos,error:mErro}=await db
.from("rotina_modelos")
.select("id,turno")
.eq("ativo",true)

if(mErro){alert("Erro modelos");return}

if(!pacientes.length||!modelos.length){
alert("Nada para gerar")
return
}

let inserts=[]

pacientes.forEach(p=>{
modelos.forEach(m=>{
inserts.push({
paciente_id:p.id,
modelo_id:m.id,
rotina_modelo_id:m.id,
turno:m.turno,
data:hoje,
status:"pendente"
})
})
})

const {error}=await db
.from("rotina_execucao")
.insert(inserts)

if(error){alert("Erro ao gerar");return}

alert("Rotinas geradas")

carregarPainel()

}

async function carregarPainel(){

const hoje=new Date().toISOString().slice(0,10)
const turno=turnoAtual()

const {data, error}=await db
.from("rotina_execucao")
.select(`
id,
status,
data,
turno,
rotina_modelos(titulo),
pacientes(nome_completo)
`)
.eq("data",hoje)
.eq("turno",turno)

if(error){
console.error(error)
return
}

renderRotinas(data)
rankingEquipe()

}

function renderRotinas(rotinas){

const painel=document.getElementById("painelRotinas")
painel.innerHTML=""

if(!rotinas.length){
painel.innerHTML="<p>Nenhuma rotina</p>"
return
}

rotinas.forEach(r=>{

const div=document.createElement("div")
div.className="rotina"

div.innerHTML=`
<span>${r.pacientes?.nome_completo||""}</span>
<span>${r.rotina_modelos?.titulo||""}</span>
<span class="${statusRotina(r)}">${r.status}</span>
<button onclick="executarRotina('${r.id}')">Executar</button>
`

painel.appendChild(div)

})

}

async function executarRotina(id){

const {error}=await db
.from("rotina_execucao")
.update({
status:"executado",
horario_execucao:new Date()
})
.eq("id",id)

if(error){
alert("Erro executar")
return
}

carregarPainel()

}

async function rankingEquipe(){

const hoje=new Date().toISOString().slice(0,10)

const {data}=await db
.from("rotina_execucao")
.select("executado_por")
.eq("data",hoje)
.eq("status","executado")

let mapa={}

data.forEach(r=>{
if(!r.executado_por)return
if(!mapa[r.executado_por])mapa[r.executado_por]=0
mapa[r.executado_por]++
})

const nomes=Object.keys(mapa)
const valores=Object.values(mapa)

const ctx=document.getElementById("graficoEquipe")

new Chart(ctx,{
type:"bar",
data:{
labels:nomes,
datasets:[{
label:"Execuções",
data:valores
}]
}
})

}

carregarPainel()

</script>

</body>
</html>
